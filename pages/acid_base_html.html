<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>酸鹼迷宮誰與爭鋒</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans TC',sans-serif;background:#0d1b2a;overflow-x:hidden}
  #root{width:100%;min-height:100vh}
  button{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

/* ── Fireworks ── */
function Fireworks({active}){
  const ref=useRef(null);
  const fr=useRef(null);
  const pts=useRef([]);
  useEffect(()=>{
    if(!active)return;
    const c=ref.current,ctx=c.getContext('2d');
    const resize=()=>{c.width=window.innerWidth;c.height=window.innerHeight};
    resize();window.addEventListener('resize',resize);
    const cols=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8','#f06595','#fff'];
    const burst=(x,y)=>{for(let i=0;i<70;i++){const a=(Math.PI*2/70)*i,s=2+Math.random()*6;pts.current.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,alpha:1,color:cols[Math.floor(Math.random()*cols.length)],r:2+Math.random()*4});}};
    let t=0;
    const loop=()=>{
      ctx.clearRect(0,0,c.width,c.height);
      if(t%22===0)burst(c.width*0.15+Math.random()*c.width*0.7,c.height*0.1+Math.random()*c.height*0.5);
      pts.current=pts.current.filter(p=>p.alpha>0.04);
      pts.current.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.07;p.alpha-=0.016;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color+Math.floor(p.alpha*255).toString(16).padStart(2,'0');ctx.fill();});
      t++;fr.current=requestAnimationFrame(loop);
    };
    fr.current=requestAnimationFrame(loop);
    return()=>{cancelAnimationFrame(fr.current);window.removeEventListener('resize',resize);pts.current=[];};
  },[active]);
  if(!active)return null;
  return React.createElement('canvas',{ref,style:{position:'fixed',inset:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:9999}});
}

/* ── Mascot ── */
function MascotCat({size=80}){
  const s=size/90;
  const d=(v)=>v*size/90;
  return(
    <div style={{position:'relative',width:size,height:size*1.2,flexShrink:0}}>
      <div style={{position:'absolute',bottom:0,left:d(9),width:d(72),height:d(54),background:'#fff8f0',borderRadius:'40% 40% 35% 35%',border:`${1.5*s}px solid #e8c89a`}}/>
      <div style={{position:'absolute',top:0,left:d(7),width:d(76),height:d(72),background:'#fff8f0',borderRadius:'50% 50% 45% 45%',border:`${1.5*s}px solid #e8c89a`}}>
        <div style={{position:'absolute',top:d(-16),left:d(4),width:d(22),height:d(22),background:'#fff8f0',borderRadius:'50% 0 0 50%',transform:'rotate(-30deg)',border:`${1.5*s}px solid #e8c89a`,borderRight:'none'}}/>
        <div style={{position:'absolute',top:d(-14),left:d(9),width:d(14),height:d(14),background:'#ffb3c6',borderRadius:'50% 0 0 50%',transform:'rotate(-30deg)'}}/>
        <div style={{position:'absolute',top:d(-16),right:d(4),width:d(22),height:d(22),background:'#fff8f0',borderRadius:'0 50% 50% 0',transform:'rotate(30deg)',border:`${1.5*s}px solid #e8c89a`,borderLeft:'none'}}/>
        <div style={{position:'absolute',top:d(-14),right:d(9),width:d(14),height:d(14),background:'#ffb3c6',borderRadius:'0 50% 50% 0',transform:'rotate(30deg)'}}/>
        <div style={{position:'absolute',top:d(20),left:d(9),display:'flex',gap:d(6)}}>
          {[0,1].map(i=>(
            <div key={i} style={{width:d(20),height:d(20),borderRadius:'50%',background:'#fff',border:`${2*s}px solid #5c8a9f`,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <div style={{width:d(10),height:d(10),borderRadius:'50%',background:'#3d2b1f'}}>
                <div style={{width:d(3),height:d(3),borderRadius:'50%',background:'#fff',marginLeft:d(2),marginTop:d(1)}}/>
              </div>
            </div>
          ))}
          <div style={{position:'absolute',top:d(8),left:d(20),width:d(6),height:2,background:'#5c8a9f'}}/>
        </div>
        <div style={{position:'absolute',top:d(42),left:'50%',transform:'translateX(-50%)',width:d(8),height:d(5),background:'#ffb3c6',borderRadius:'50% 50% 50% 50% / 60% 60% 40% 40%'}}/>
        <div style={{position:'absolute',top:d(50),left:'50%',transform:'translateX(-50%)',fontSize:d(9),color:'#c9748f'}}>⌣</div>
      </div>
      {[['#4d96ff','#2563eb'],['#ffd93d','#d97706'],['#6bcb77','#15803d']].map(([bg,bd],i)=>(
        <div key={i} style={{position:'absolute',top:i*d(6)-2,left:d(27)+(i%2)*d(4),width:d(36),height:d(8),background:bg,border:`${1.5*s}px solid ${bd}`,borderRadius:2,zIndex:10-i}}/>
      ))}
    </div>
  );
}

function SpeechBubble({text,type='normal'}){
  const cfg={normal:{bg:'#fffdf0',bd:'#d4a847',cl:'#5a3e1b'},error:{bg:'#fff3cd',bd:'#ffc107',cl:'#856404'},success:{bg:'#d4edda',bd:'#28a745',cl:'#155724'}}[type];
  return(
    <div style={{position:'relative',background:cfg.bg,border:`2px solid ${cfg.bd}`,borderRadius:16,padding:'12px 16px',fontSize:15,color:cfg.cl,lineHeight:1.65,flex:1,minWidth:0}}>
      <div style={{position:'absolute',left:-12,top:18,width:0,height:0,borderTop:'8px solid transparent',borderBottom:'8px solid transparent',borderRight:`12px solid ${cfg.bd}`}}/>
      <div style={{position:'absolute',left:-9,top:19,width:0,height:0,borderTop:'7px solid transparent',borderBottom:'7px solid transparent',borderRight:`11px solid ${cfg.bg}`}}/>
      {text}
    </div>
  );
}

/* ── Progress ── */
function ProgressBar({stage}){
  const labels=['第一關','第二關','第三關','完成'];
  return(
    <div style={{display:'flex',gap:6,justifyContent:'center'}}>
      {labels.map((l,i)=>(
        <div key={i} style={{padding:'5px 16px',borderRadius:20,fontSize:13,fontWeight:700,
          background:i===stage?'rgba(255,255,255,0.9)':i<stage?'rgba(255,255,255,0.4)':'rgba(255,255,255,0.15)',
          color:i===stage?'#1a237e':i<stage?'#2d5a38':'rgba(255,255,255,0.55)',
          border:'1.5px solid rgba(255,255,255,0.3)',transition:'all .4s'}}>
          {i<stage?'✓ ':''}{l}
        </div>
      ))}
    </div>
  );
}

/* ── Stage 1 ── */
function Stage1({onPass}){
  const [sel,setSel]=useState([]);
  const [result,setResult]=useState(null);
  const [fw,setFw]=useState(false);
  const opts=[
    {id:'A',text:'電解質在水中會自動解離成陰離子與陽離子。'},
    {id:'B',text:'電解質在水中解離出的陰離子與陽離子，個數相同。'},
    {id:'C',text:'陰離子與陽離子所帶的總電量會相等。'},
  ];
  const toggle=id=>{if(result==='correct')return;setSel(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);setResult(null);};
  const submit=()=>{
    if(!sel.length){setResult('empty');return;}
    const a=sel.includes('A'),b=sel.includes('B'),c=sel.includes('C');
    if(a&&c&&!b&&sel.length===2){setResult('correct');setFw(true);setTimeout(()=>setFw(false),3200);setTimeout(()=>onPass(),3500);}
    else if(b)setResult('b');
    else setResult('incomplete');
  };
  const msgs={
    correct:'🎉 完全正確！(A)(C) 都對！電解質解離產生陰陽離子，總電量守恆，但個數不一定相等。恭喜進入第二關！',
    b:'⚠️ 要注意！雖然總電量相等，但若離子帶的電荷不同（例如 MgCl₂ 解離出 1 個 Mg²⁺ 和 2 個 Cl⁻），離子個數就不一定相同！',
    incomplete:'🤔 答案不完整！共有兩個正確選項，請仔細再想想！',
    empty:'請先選擇選項再送出！'
  };
  const optSty=id=>{
    const s=sel.includes(id);
    if(result==='correct'&&s)return{bg:'rgba(107,203,119,.35)',bd:'#6bcb77'};
    if(result&&id==='B'&&s)return{bg:'rgba(255,100,100,.3)',bd:'#ff6b6b'};
    if(s)return{bg:'rgba(255,255,255,.25)',bd:'rgba(255,255,255,.9)'};
    return{bg:'rgba(255,255,255,.07)',bd:'rgba(255,255,255,.25)'};
  };
  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',gap:16}}>
      <Fireworks active={fw}/>
      <div style={{textAlign:'center',fontSize:20,fontWeight:800,color:'#fff',letterSpacing:1,textShadow:'0 2px 8px rgba(0,0,0,.4)'}}>⚡ 第一關：電解質迷宮</div>
      <div style={{background:'linear-gradient(160deg,#4a7c59,#2d5a38)',borderRadius:18,padding:'22px 24px',border:'7px solid #c8a87a',boxShadow:'inset 0 0 30px rgba(0,0,0,.25)',flex:1,display:'flex',flexDirection:'column',justifyContent:'space-between'}}>
        <div style={{fontSize:17,fontWeight:800,color:'#fff',marginBottom:18,lineHeight:1.5,textShadow:'1px 1px 3px rgba(0,0,0,.4)'}}>
          閱讀以下有關電解質的敘述，選出正確的選項。（複選題）
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:12,flex:1,justifyContent:'center'}}>
          {opts.map(o=>{const st=optSty(o.id);return(
            <div key={o.id} onClick={()=>toggle(o.id)} style={{display:'flex',alignItems:'center',gap:14,background:st.bg,border:`2.5px solid ${st.bd}`,borderRadius:14,padding:'14px 18px',cursor:'pointer',transition:'all .15s',userSelect:'none'}}>
              <div style={{width:34,height:34,borderRadius:8,flexShrink:0,background:sel.includes(o.id)?'rgba(255,255,255,.9)':'rgba(255,255,255,.12)',border:'2px solid rgba(255,255,255,.5)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,fontWeight:800,color:sel.includes(o.id)?'#3a6b47':'rgba(255,255,255,.5)'}}>
                {sel.includes(o.id)?'✓':''}
              </div>
              <span style={{fontSize:16,color:'#e8f5e8',fontWeight:500,lineHeight:1.5}}>
                <span style={{color:'#a8e6b4',fontWeight:700,marginRight:6}}>({o.id})</span>{o.text}
              </span>
            </div>
          );})}
        </div>
        <div style={{display:'flex',justifyContent:'center',gap:6,marginTop:16}}>
          {['#ff9999','#ffffaa','#aaddff','#ccffcc','#ffccee'].map((c,i)=>(
            <div key={i} style={{width:30,height:9,background:c,borderRadius:4,opacity:.7}}/>
          ))}
        </div>
        <div style={{textAlign:'center',marginTop:14,fontSize:13,color:'rgba(255,255,255,.55)'}}>請選好答案後，按下「送出」按鈕</div>
      </div>
      {result&&(
        <div style={{display:'flex',alignItems:'flex-start',gap:12}}>
          <MascotCat size={70}/>
          <SpeechBubble text={msgs[result]} type={result==='correct'?'success':'error'}/>
        </div>
      )}
      {result!=='correct'&&(
        <button onClick={submit} style={{width:'100%',padding:15,fontSize:20,fontWeight:800,background:sel.length?'linear-gradient(90deg,#e8a020,#d4691e)':'#616161',color:'#fff',border:'none',borderRadius:14,cursor:sel.length?'pointer':'not-allowed',letterSpacing:3,boxShadow:sel.length?'0 4px 18px rgba(212,105,30,.45)':'none',transition:'all .2s'}}>送　出</button>
      )}
    </div>
  );
}

/* ── Stage 2 ── */
function Stage2({onPass}){
  const [cup1,setCup1]=useState(null);
  const [cup2,setCup2]=useState(null);
  const [drag,setDrag]=useState(null);
  const [ans,setAns]=useState({});
  const [result,setResult]=useState(null);
  const [fw,setFw]=useState(false);
  const reagents=[{id:'phenol',label:'酚酞',emoji:'🧴',color:'#f48fb1',hint:'無色→粉紅（鹼）'},{id:'btb',label:'廣用試劑',emoji:'🧪',color:'#4fc3f7',hint:'紅/橙/黃/綠/藍'}];
  const cups=[{id:1,label:'杯 A（HCl）',acid:true},{id:2,label:'杯 B（NaOH）',acid:false}];
  const gc=(r,a)=>{if(!r)return'#dbeafe';if(r==='phenol')return a?'#f5f5f5':'#f48fb1';return a?'#ef9a9a':'#80cbc4';};
  const gl=(r,a)=>{if(!r)return'（無色液體）';if(r==='phenol')return a?'無色（酸）':'粉紅色（鹼）';return a?'紅色（酸）':'藍綠色（鹼）';};
  const drop=id=>{if(!drag)return;id===1?setCup1(drag):setCup2(drag);setDrag(null);};
  const submit=()=>{if(ans[1]==='<7'&&ans[2]==='>7'){setResult('correct');setFw(true);setTimeout(()=>setFw(false),3200);setTimeout(()=>onPass(),3500);}else setResult('wrong');};
  const retry=()=>{setCup1(null);setCup2(null);setAns({});setResult(null);};
  const both=cup1&&cup2;
  const msg=result==='correct'?'🎉 完全正確！酸性 pH < 7，鹼性 pH > 7！':result==='wrong'?'⚠️ 再想想！觀察試劑顏色，判斷哪杯是酸性哪杯是鹼性～':'把試劑拖曳到杯子中，觀察顏色，再選出正確的 pH 值範圍！';
  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',gap:14}}>
      <Fireworks active={fw}/>
      <div style={{textAlign:'center',fontSize:20,fontWeight:800,color:'#fff',letterSpacing:1,textShadow:'0 2px 8px rgba(0,0,0,.4)'}}>🧪 第二關：顏色變變變</div>
      <div style={{display:'flex',alignItems:'flex-start',gap:12}}>
        <MascotCat size={70}/><SpeechBubble text={msg} type={result==='correct'?'success':result==='wrong'?'error':'normal'}/>
      </div>
      <div style={{display:'flex',gap:12,justifyContent:'center'}}>
        {reagents.map(r=>(
          <div key={r.id} draggable onDragStart={()=>setDrag(r.id)} onDragEnd={()=>setDrag(null)}
            style={{background:r.color+'33',border:`2.5px solid ${r.color}`,borderRadius:14,padding:'12px 18px',cursor:'grab',textAlign:'center',minWidth:110,userSelect:'none'}}>
            <div style={{fontSize:28}}>{r.emoji}</div>
            <div style={{fontWeight:700,fontSize:14,marginTop:4}}>{r.label}</div>
            <div style={{fontSize:11,color:'#666',marginTop:2}}>{r.hint}</div>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:16,justifyContent:'center',flex:1,alignItems:'center',flexWrap:'wrap'}}>
        {cups.map(c=>{const r=c.id===1?cup1:cup2;return(
          <div key={c.id} onDragOver={e=>e.preventDefault()} onDrop={()=>drop(c.id)} style={{textAlign:'center',minWidth:140}}>
            <div style={{fontSize:13,color:'rgba(255,255,255,.8)',marginBottom:8,fontWeight:600}}>{c.label}</div>
            <div style={{width:110,height:120,margin:'0 auto',background:gc(r,c.acid),border:`3px dashed ${r?'#9e9e9e':'#90caf9'}`,borderRadius:'0 0 50px 50px',display:'flex',alignItems:'center',justifyContent:'center',transition:'background .5s'}}>
              <span style={{fontSize:11,color:'#555',textAlign:'center',padding:6}}>{gl(r,c.acid)}</span>
            </div>
            {both&&!result&&(
              <div style={{marginTop:10,display:'flex',gap:8,justifyContent:'center'}}>
                {['<7','>7'].map(v=>(
                  <button key={v} onClick={()=>setAns(a=>({...a,[c.id]:v}))} style={{padding:'8px 14px',borderRadius:10,fontSize:14,fontWeight:700,background:ans[c.id]===v?'#7b1fa2':'#f3e5f5',color:ans[c.id]===v?'#fff':'#7b1fa2',border:'2px solid #7b1fa2',cursor:'pointer'}}>pH {v}</button>
                ))}
              </div>
            )}
          </div>
        );})}
      </div>
      {both&&Object.keys(ans).length===2&&!result&&(
        <button onClick={submit} style={{width:'100%',padding:14,fontSize:20,fontWeight:800,background:'linear-gradient(90deg,#7b1fa2,#4a148c)',color:'#fff',border:'none',borderRadius:14,cursor:'pointer',letterSpacing:3}}>送　出</button>
      )}
      {result==='wrong'&&(
        <button onClick={retry} style={{width:'100%',padding:14,fontSize:18,fontWeight:800,background:'#ff9800',color:'#fff',border:'none',borderRadius:14,cursor:'pointer',marginTop:10}}>再試一次 ↺</button>
      )}
    </div>
  );
}

/* ── Stage 3 ── */
function Stage3({onPass}){
  const [step,setStep]=useState(0);
  const [temp,setTemp]=useState(25);
  const [fw,setFw]=useState(false);
  const [heatAns,setHeatAns]=useState(null);
  const [heatResult,setHeatResult]=useState(null);
  const [productAns,setProductAns]=useState(null);
  const [productResult,setProductResult]=useState(null);
  const msgs=['點擊兩個燒杯，把鹽酸和氫氧化鈉混合！','溫度上升了！觀察完後，請回答下面的問題 ⬇️','請選擇：酸鹼中和反應是放熱還是吸熱反應？','答對了！現在點擊酒精燈，把水分蒸乾 🔥','水蒸發後出現白色固體！請問產生的產物是什麼？','完全正確！HCl + NaOH → NaCl + H₂O 🎉 中和產生鹽和水，並且放熱！'];
  const mix=()=>{if(step===0)setStep(1);};
  const ckTemp=()=>{if(step===1){setTemp(43);setStep(2);}};
  const submitHeat=()=>{if(!heatAns)return;if(heatAns==='放熱'){setHeatResult('correct');setTimeout(()=>setStep(3),900);}else setHeatResult('wrong');};
  const heat=()=>{if(step===3)setStep(4);};
  const submitProduct=()=>{if(!productAns)return;if(productAns==='NaCl + H₂O'){setProductResult('correct');setFw(true);setTimeout(()=>setFw(false),3200);setTimeout(()=>setStep(5),900);}else setProductResult('wrong');};
  const heatOpts=['放熱','吸熱','不吸不放','視情況而定'];
  const productOpts=['NaCl + H₂O','NaOH + HCl','Na₂O + H₂Cl','NaCl + CO₂'];
  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',gap:12}}>
      <Fireworks active={fw}/>
      <div style={{textAlign:'center',fontSize:20,fontWeight:800,color:'#fff',letterSpacing:1,textShadow:'0 2px 8px rgba(0,0,0,.4)'}}>⚗️ 第三關：酸鹼中和挑戰</div>
      <div style={{display:'flex',alignItems:'flex-start',gap:12}}>
        <MascotCat size={70}/><SpeechBubble text={msgs[step]} type={step===5?'success':'normal'}/>
      </div>
      <div style={{display:'flex',gap:14,justifyContent:'center',alignItems:'center',flexWrap:'wrap'}}>
        {step===0?(<>
          <div onClick={mix} style={{textAlign:'center',cursor:'pointer',background:'#e3f2fd',border:'3px solid #1976d2',borderRadius:16,padding:'16px 20px',minWidth:100}}>
            <div style={{fontSize:32}}>🧪</div><div style={{fontWeight:700,color:'#1565c0',marginTop:5,fontSize:14}}>鹽酸 HCl</div><div style={{fontSize:11,color:'#888'}}>點擊混合</div>
          </div>
          <div onClick={mix} style={{textAlign:'center',cursor:'pointer',background:'#fce4ec',border:'3px solid #c62828',borderRadius:16,padding:'16px 20px',minWidth:100}}>
            <div style={{fontSize:32}}>🧪</div><div style={{fontWeight:700,color:'#b71c1c',marginTop:5,fontSize:14}}>NaOH</div><div style={{fontSize:11,color:'#888'}}>點擊混合</div>
          </div>
        </>):(
          <div style={{textAlign:'center',background:'#e8f5e9',border:'3px solid #388e3c',borderRadius:16,padding:'14px 24px'}}>
            <div style={{fontSize:32}}>🧫</div><div style={{fontWeight:700,color:'#2e7d32',marginTop:5,fontSize:14}}>混合溶液</div>
          </div>
        )}
        <div onClick={ckTemp} style={{textAlign:'center',cursor:step===1?'pointer':'default',background:step>=1?'#fff3e0':'#eee',border:`3px solid ${step===1?'#ff9800':'#bdbdbd'}`,borderRadius:16,padding:'14px 18px',minWidth:100,opacity:step>=1?1:.4,transition:'all .3s',position:'relative'}}>
          <div style={{fontSize:32}}>🌡️</div>
          <div style={{fontWeight:700,color:step>=1?'#e65100':'#9e9e9e',marginTop:5,fontSize:14}}>溫度計</div>
          <div style={{fontSize:20,fontWeight:800,color:'#e65100',marginTop:2}}>{temp}°C</div>
          {step===1&&<div style={{position:'absolute',top:-8,right:-8,background:'#ff9800',color:'#fff',borderRadius:10,fontSize:11,padding:'2px 7px',fontWeight:700}}>點我！</div>}
        </div>
        <div onClick={heat} style={{textAlign:'center',cursor:step===3?'pointer':'default',background:step>=3?'#fff8e1':'#eee',border:`3px solid ${step===3?'#f57f17':'#bdbdbd'}`,borderRadius:16,padding:'14px 18px',minWidth:100,opacity:step>=3?1:.4,transition:'all .3s',position:'relative'}}>
          <div style={{fontSize:32}}>🔥</div>
          <div style={{fontWeight:700,color:step>=3?'#ff6f00':'#9e9e9e',marginTop:5,fontSize:14}}>酒精燈</div>
          <div style={{fontSize:11,color:'#888',marginTop:2}}>加熱蒸發</div>
          {step===3&&<div style={{position:'absolute',top:-8,right:-8,background:'#f57f17',color:'#fff',borderRadius:10,fontSize:11,padding:'2px 7px',fontWeight:700}}>點我！</div>}
        </div>
        {step>=4&&(
          <div style={{textAlign:'center',background:'linear-gradient(135deg,#f5f5f5,#e0e0e0)',border:'3px solid #757575',borderRadius:16,padding:'14px 20px'}}>
            <div style={{fontSize:32}}>🧂</div><div style={{fontWeight:700,color:'#424242',marginTop:5,fontSize:14}}>白色固體</div>
          </div>
        )}
      </div>
      {step===2&&(
        <div style={{background:'rgba(255,255,255,.1)',borderRadius:16,padding:'16px 18px',border:'2px solid rgba(255,200,80,.5)'}}>
          <div style={{color:'#ffd93d',fontWeight:800,fontSize:15,marginBottom:12}}>🌡️ 水溫從 25°C 升到 43°C，酸鹼中和反應是？</div>
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            {heatOpts.map(o=>{
              const s=heatAns===o;
              let bg='rgba(255,255,255,.12)',bd='rgba(255,255,255,.3)',cl='#fff';
              if(s&&heatResult==='correct'){bg='rgba(107,203,119,.4)';bd='#6bcb77';}
              else if(s&&heatResult==='wrong'){bg='rgba(255,100,100,.35)';bd='#ff6b6b';}
              else if(s){bg='rgba(255,255,255,.25)';bd='#fff';}
              return(<button key={o} onClick={()=>{if(!heatResult){setHeatAns(o);setHeatResult(null);}}} style={{flex:'1 0 120px',padding:'12px 10px',borderRadius:12,fontSize:16,fontWeight:700,background:bg,color:cl,border:`2.5px solid ${bd}`,cursor:heatResult?'default':'pointer',transition:'all .2s'}}>{o}</button>);
            })}
          </div>
          {heatResult==='wrong'&&<div style={{marginTop:10,color:'#ffcdd2',fontSize:14}}>⚠️ 水溫升高表示溶液獲得了熱量，那反應本身是放熱還是吸熱？</div>}
          {!heatResult&&heatAns&&<button onClick={submitHeat} style={{marginTop:12,width:'100%',padding:12,fontSize:17,fontWeight:800,background:'linear-gradient(90deg,#e8a020,#d4691e)',color:'#fff',border:'none',borderRadius:12,cursor:'pointer',letterSpacing:2}}>確認答案</button>}
        </div>
      )}
      {step===4&&(
        <div style={{background:'rgba(255,255,255,.1)',borderRadius:16,padding:'16px 18px',border:'2px solid rgba(180,120,255,.5)'}}>
          <div style={{color:'#ce93d8',fontWeight:800,fontSize:15,marginBottom:12}}>🧂 HCl + NaOH 的產物是？</div>
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            {productOpts.map(o=>{
              const s=productAns===o;
              let bg='rgba(255,255,255,.12)',bd='rgba(255,255,255,.3)',cl='#fff';
              if(s&&productResult==='correct'){bg='rgba(107,203,119,.4)';bd='#6bcb77';}
              else if(s&&productResult==='wrong'){bg='rgba(255,100,100,.35)';bd='#ff6b6b';}
              else if(s){bg='rgba(255,255,255,.25)';bd='#fff';}
              return(<button key={o} onClick={()=>{if(!productResult){setProductAns(o);setProductResult(null);}}} style={{flex:'1 0 140px',padding:'12px 10px',borderRadius:12,fontSize:15,fontWeight:700,background:bg,color:cl,border:`2.5px solid ${bd}`,cursor:productResult?'default':'pointer',transition:'all .2s',fontFamily:'monospace'}}>{o}</button>);
            })}
          </div>
          {productResult==='wrong'&&<div style={{marginTop:10,color:'#ffcdd2',fontSize:14}}>⚠️ 鹽酸的 H⁺ 和氫氧化鈉的 OH⁻ 結合成水，Na⁺ 和 Cl⁻ 結合成食鹽！</div>}
          {!productResult&&productAns&&<button onClick={submitProduct} style={{marginTop:12,width:'100%',padding:12,fontSize:17,fontWeight:800,background:'linear-gradient(90deg,#7b1fa2,#4a148c)',color:'#fff',border:'none',borderRadius:12,cursor:'pointer',letterSpacing:2}}>確認答案</button>}
        </div>
      )}
      <div style={{background:'rgba(243,229,245,.15)',borderRadius:12,padding:'9px 16px',fontFamily:'monospace',fontSize:14,color:'rgba(255,255,255,.85)',textAlign:'center',border:'1px solid rgba(200,150,255,.3)'}}>
        HCl + NaOH → NaCl + H₂O　（放熱反應）
      </div>
      {step===5&&<button onClick={onPass} style={{width:'100%',padding:14,fontSize:20,fontWeight:800,background:'linear-gradient(90deg,#e65100,#6a1b9a)',color:'#fff',border:'none',borderRadius:14,cursor:'pointer',letterSpacing:3}}>查看成績 🎊</button>}
    </div>
  );
}

/* ── Final ── */
function FinalScreen(){
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:16,textAlign:'center'}}>
      <div style={{fontSize:72,marginBottom:6}}>🏆</div>
      <div style={{fontSize:26,fontWeight:900,color:'#fff',textShadow:'0 2px 12px rgba(0,0,0,.5)'}}>恭喜完成酸鹼迷宮！</div>
      <div style={{fontSize:15,color:'rgba(255,255,255,.8)'}}>你已掌握電解質、酸鹼指示劑與中和反應的核心概念！</div>
      <div style={{display:'flex',gap:14,justifyContent:'center',flexWrap:'wrap'}}>
        {[['⚡','第一關','電解質解離'],['🧪','第二關','酸鹼指示劑'],['⚗️','第三關','中和反應']].map(([e,t,d],i)=>(
          <div key={i} style={{background:'rgba(255,255,255,.15)',border:'2px solid rgba(255,255,255,.4)',borderRadius:16,padding:'16px 20px',minWidth:130,backdropFilter:'blur(6px)'}}>
            <div style={{fontSize:28}}>{e}</div>
            <div style={{fontWeight:700,color:'#fff',marginTop:6}}>{t} ✓</div>
            <div style={{fontSize:13,color:'rgba(255,255,255,.75)'}}>{d}</div>
          </div>
        ))}
      </div>
      <div style={{display:'flex',alignItems:'flex-start',gap:12,maxWidth:500,width:'100%'}}>
        <MascotCat size={80}/>
        <SpeechBubble text="你是真正的酸鹼小達人！電解質解離、指示劑變色、中和放熱——三個概念全掌握！繼續加油！" type="success"/>
      </div>
    </div>
  );
}

/* ── App ── */
function App(){
  const [stage,setStage]=useState(0);
  const bgs=[
    'linear-gradient(135deg,#0d1b2a 0%,#1a3a2a 40%,#0d2b1a 100%)',
    'linear-gradient(135deg,#1a0a2e 0%,#2d1b4e 50%,#0a1628 100%)',
    'linear-gradient(135deg,#2a0a00 0%,#3d1a00 40%,#1a0a2e 100%)',
    'linear-gradient(135deg,#0a2010 0%,#1b3a0a 50%,#0a1a30 100%)',
  ];
  return(
    <div style={{position:'fixed',inset:0,background:bgs[stage],display:'flex',flexDirection:'column',overflow:'hidden',transition:'background 1s'}}>
      {/* Stars */}
      <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none'}}>
        {Array.from({length:60}).map((_,i)=>(
          <div key={i} style={{position:'absolute',width:i%5===0?3:2,height:i%5===0?3:2,borderRadius:'50%',background:'rgba(255,255,255,.6)',left:`${(i*137.5)%100}%`,top:`${(i*97.3)%100}%`,opacity:.3+.3*(i%3)}}/>
        ))}
      </div>
      {/* Header */}
      <div style={{position:'relative',zIndex:10,padding:'14px 20px 10px',borderBottom:'1px solid rgba(255,255,255,.1)',background:'rgba(0,0,0,.25)',backdropFilter:'blur(8px)',flexShrink:0}}>
        <div style={{maxWidth:800,margin:'0 auto'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <div>
              <div style={{fontSize:22,fontWeight:900,color:'#fff',letterSpacing:2,textShadow:'0 0 20px rgba(100,200,255,.5)'}}>🔬 酸鹼迷宮誰與爭鋒</div>
              <div style={{fontSize:12,color:'rgba(255,255,255,.5)',marginTop:2}}>互動科學闖關遊戲</div>
            </div>
            <div style={{display:'flex',gap:8}}>
              {[0,1,2,3].map(i=>(
                <div key={i} style={{width:12,height:12,borderRadius:'50%',background:i<=stage?'#6bcb77':'rgba(255,255,255,.2)',boxShadow:i===stage?'0 0 8px #6bcb77':'none',transition:'all .4s'}}/>
              ))}
            </div>
          </div>
          <ProgressBar stage={stage}/>
        </div>
      </div>
      {/* Content */}
      <div style={{position:'relative',zIndex:10,flex:1,overflow:'auto',padding:'20px',display:'flex',flexDirection:'column'}}>
        <div style={{maxWidth:800,margin:'0 auto',width:'100%',flex:1,display:'flex',flexDirection:'column',background:'rgba(255,255,255,.06)',borderRadius:20,padding:'20px',backdropFilter:'blur(4px)',border:'1px solid rgba(255,255,255,.1)'}}>
          {stage===0&&<Stage1 onPass={()=>setStage(1)}/>}
          {stage===1&&<Stage2 onPass={()=>setStage(2)}/>}
          {stage===2&&<Stage3 onPass={()=>setStage(3)}/>}
          {stage===3&&<FinalScreen/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
