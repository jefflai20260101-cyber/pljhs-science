<style>
  :root{
    --paper:#EDEAE0;
    --paper-deep:#E4E0D2;
    --ink:#2B2620;
    --ink-soft:#6B6355;
    --card:#FAF8F2;
    --line:#D8D3C2;
    --k-prokaryote:#5B3A8E; --k-prokaryote-tint:#EFE9F9;
    --k-protist:#0E7C86;    --k-protist-tint:#E2F3F3;
    --k-fungi:#B5651D;      --k-fungi-tint:#FBEDDD;
    --k-plant:#2F6B3A;      --k-plant-tint:#E7F1E4;
    --k-animal:#2C4A7C;     --k-animal-tint:#E5EAF3;
  }
  *{box-sizing:border-box;}
  html,body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Noto Sans TC',sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  body{
    background-image:
      radial-gradient(circle at 1px 1px, rgba(43,38,32,0.06) 1px, transparent 0);
    background-size:22px 22px;
  }
  .font-display{font-family:'Noto Serif TC',serif;}
  .label-tag{
    font-family:'Noto Sans TC',sans-serif;
    letter-spacing:.12em;
    font-size:11px;
  }
  ::-webkit-scrollbar{height:6px;width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}

  .tab-underline{position:relative;}
  .tab-underline::after{
    content:'';position:absolute;left:0;right:0;bottom:-1px;height:3px;
    background:var(--ink);border-radius:2px;
    transform:scaleX(0);transform-origin:left;transition:transform .3s ease;
  }
  .tab-underline.active::after{transform:scaleX(1);}

  .spec-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
  }
  .spec-card:hover{transform:translateY(-3px);box-shadow:0 10px 24px -12px rgba(43,38,32,.25);}
  .spec-card.is-active{box-shadow:0 14px 30px -14px rgba(43,38,32,.35);}

  .branch-wrap{position:relative;padding-left:26px;}
  .branch-wrap::before{
    content:'';position:absolute;left:6px;top:6px;bottom:6px;width:2px;
    background:linear-gradient(to bottom, currentColor, transparent 97%);
    opacity:.35;
  }
  .branch-node{position:relative;padding-left:20px;margin-bottom:18px;}
  .branch-node::before{
    content:'';position:absolute;left:-20px;top:10px;width:20px;height:2px;background:currentColor;opacity:.35;
  }
  .branch-dot{
    position:absolute;left:-6px;top:2px;width:16px;height:16px;border-radius:999px;
    border:3px solid var(--card);box-shadow:0 0 0 2px currentColor;background:currentColor;
  }
  .pill{
    display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;
    font-size:12px;font-weight:500;
  }
  .feature-chip{
    display:inline-flex;align-items:center;padding:2px 9px;border-radius:6px;
    font-size:12px;border:1px solid currentColor;opacity:.85;margin:2px 4px 2px 0;
  }

  @keyframes popCorrect{
    0%{transform:scale(1);}
    35%{transform:scale(1.045);box-shadow:0 0 0 6px rgba(47,107,58,.18);}
    100%{transform:scale(1);box-shadow:0 0 0 0 rgba(47,107,58,0);}
  }
  @keyframes shakeWrong{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-8px);}
    40%{transform:translateX(7px);}
    60%{transform:translateX(-5px);}
    80%{transform:translateX(4px);}
  }
  .anim-correct{animation:popCorrect .5s ease;}
  .anim-wrong{animation:shakeWrong .45s ease;}

  @keyframes floatIn{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
  }
  .float-in{animation:floatIn .35s ease both;}

  .progress-track{background:var(--paper-deep);border-radius:999px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:999px;transition:width .35s ease;background:var(--ink);}

  .kingdom-btn{
    border:1.6px solid var(--line);background:var(--card);border-radius:12px;
    transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .kingdom-btn:active{transform:scale(.96);}
  .kingdom-btn:disabled{opacity:.5;}

  .step-num{
    font-family:'Noto Serif TC',serif;font-weight:900;
  }
  .step-line{
    position:absolute;left:23px;top:52px;bottom:-24px;width:2px;
    background:repeating-linear-gradient(to bottom, var(--line) 0 6px, transparent 6px 12px);
  }
  .step-item:last-child .step-line{display:none;}

  @media (prefers-reduced-motion: reduce){
    .spec-card, .anim-correct, .anim-wrong, .float-in, .kingdom-btn{animation:none!important;transition:none!important;}
  }
</style>
</head>

<div class="max-w-6xl mx-auto px-4 sm:px-6 pb-16">

  <!-- Header -->
  <header class="pt-8 sm:pt-10 pb-5">

      <div class="label-tag px-2.5 py-1 rounded-full border border-[var(--ink)] text-[var(--ink)] uppercase">Biology Field Guide · 生物分類</div>
    </div>
    <h1 class="font-display text-3xl sm:text-4xl font-black tracking-tight leading-tight">五界生物 <span class="text-[var(--ink-soft)] font-medium text-2xl sm:text-3xl">心智圖複習站</span></h1>
    <p class="mt-2 text-sm sm:text-[15px] text-[var(--ink-soft)] max-w-2xl">從原核到動物，五個界、五種顏色。點一點知識樹、玩一場歸類挑戰，最後畫出屬於你自己的心智圖筆記。</p>

    <button data-tab="game" class="tabbtn tab-underline flex items-center gap-2 whitespace-nowrap px-3 sm:px-4 py-3 font-display font-bold text-[15px] sm:text-base text-[var(--ink-soft)]">

      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V4H6.5A2.5 2.5 0 0 0 4 6.5v13z"/><path d="M8 8h8M8 12h6"/></svg>

  </nav>

  <!-- TAB 1: TREE -->

  <!-- TAB 2: GAME -->
  <section id="panel-game" class="pt-7 hidden"></section>

  <!-- TAB 3: GUIDE -->
  <section id="panel-guide" class="pt-7 hidden"></section>

</div>

/* ================= SOUND ================= */
let actx=null;
function sound(type){
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(), g=actx.createGain();
    o.connect(g); g.connect(actx.destination);
    const now=actx.currentTime;
    if(type==='correct'){
      o.type='sine'; o.frequency.setValueAtTime(523,now); o.frequency.setValueAtTime(784,now+0.09);
      g.gain.setValueAtTime(0.12,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.32);
      o.start(now); o.stop(now+0.33);
    }else if(type==='wrong'){
      o.type='sawtooth'; o.frequency.setValueAtTime(196,now); o.frequency.setValueAtTime(146,now+0.12);
      g.gain.setValueAtTime(0.09,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.28);
      o.start(now); o.stop(now+0.29);
    }else{
      o.type='sine'; o.frequency.setValueAtTime(340,now);
      g.gain.setValueAtTime(0.05,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.09);
      o.start(now); o.stop(now+0.1);
    }
  }catch(e){}
}

/* ================= TAB 2: GAME ================= */
let gameOrder=[], gameIdx=0, gameScore=0, gameLocked=false, wrongList=[];
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function startGame(){
  gameOrder=shuffle(GAME_ITEMS);
  gameIdx=0; gameScore=0; gameLocked=false; wrongList=[];
  renderGame();
}
function renderGame(){
  const el=document.getElementById('panel-game');
  if(gameIdx >= gameOrder.length){ renderGameEnd(el); return; }
  const item=gameOrder[gameIdx];
  const pct = Math.round((gameIdx/gameOrder.length)*100);
  el.innerHTML=`
    <div class="max-w-2xl mx-auto">
      <div class="flex items-center justify-between mb-2 text-sm">
        <span class="label-tag text-[var(--ink-soft)] uppercase">第 ${gameIdx+1} / ${gameOrder.length} 題</span>
        <span class="font-display font-bold">分數：${gameScore}</span>
      </div>
      <div class="progress-track h-2 mb-6"><div class="progress-fill" style="width:${pct}%"></div></div>

      <div id="game-card" class="spec-card p-6 sm:p-8 text-center mb-6">
        <div class="label-tag text-[var(--ink-soft)] uppercase mb-2">請判斷這個生物屬於哪一界</div>
        <h3 class="font-display text-3xl sm:text-4xl font-black mb-3">${item.name}</h3>
        <p class="text-[var(--ink-soft)] text-sm sm:text-base">${item.hint}</p>
        <div id="game-feedback" class="mt-4 min-h-[24px] font-display font-bold text-sm sm:text-base"></div>
      </div>

      <div class="grid grid-cols-2 sm:grid-cols-5 gap-2.5 sm:gap-3">
        ${KINGDOMS.map(k=>`
          <button data-k="${k.id}" class="kingdom-btn ans-btn flex flex-col items-center gap-1.5 py-3.5 px-2">
            <div class="w-8 h-8 rounded-full flex items-center justify-center" style="background:${k.tint};color:${k.color}">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none">${k.icon}</svg>
            </div>
            <span class="text-[13px] font-medium">${k.name.replace('生物界','').replace('界','')}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `;
  el.querySelectorAll('.ans-btn').forEach(b=>{
    b.addEventListener('click', ()=>handleAnswer(b.dataset.k, item));
  });
}
function handleAnswer(kId, item){
  if(gameLocked) return;
  gameLocked=true;
  const card=document.getElementById('game-card');
  const fb=document.getElementById('game-feedback');
  const correct = kId===item.k;
  const correctK = byId(item.k);
  document.querySelectorAll('.ans-btn').forEach(b=>{
    b.disabled=true;
    if(b.dataset.k===item.k){ b.style.borderColor=correctK.color; b.style.background=correctK.tint; }
  });
  if(correct){
    gameScore++;
    card.classList.add('anim-correct');
    fb.innerHTML=`<span style="color:${correctK.color}">✓ 答對了！${item.name} 屬於「${correctK.name}」</span>`;
    sound('correct');
  }else{
    wrongList.push(item);
    card.classList.add('anim-wrong');
    fb.innerHTML=`<span style="color:#B3413A">✕ 正確答案是「${correctK.name}」</span>`;
    sound('wrong');
  }
  setTimeout(()=>{
    gameIdx++;
    gameLocked=false;
    renderGame();
  }, 1100);
}
function renderGameEnd(el){
  const pct = Math.round((gameScore/gameOrder.length)*100);
  el.innerHTML=`
    <div class="max-w-2xl mx-auto text-center">
      <div class="label-tag text-[var(--ink-soft)] uppercase mb-2">挑戰結束</div>
      <h3 class="font-display text-4xl sm:text-5xl font-black mb-2">${gameScore} / ${gameOrder.length}</h3>
      <p class="text-[var(--ink-soft)] mb-8">正確率 ${pct}%　${pct>=90?'太厲害了，你是分類小博士！':pct>=70?'很不錯，再複習一下就更穩了！':'沒關係，回到「知識樹」再複習一次吧！'}</p>

      ${wrongList.length ? `
        <div class="text-left mb-8">
          <div class="font-display font-bold mb-3">答錯的題目回顧</div>
          <div class="space-y-2">
            ${wrongList.map(w=>{ const k=byId(w.k); return `
              <div class="spec-card p-3.5 flex items-center justify-between gap-3">
                <div>
                  <span class="font-medium">${w.name}</span>
                  <span class="text-[var(--ink-soft)] text-sm">　${w.hint}</span>
                </div>
                <span class="pill shrink-0" style="background:${k.tint};color:${k.color}">${k.name}</span>
              </div>
            `}).join('')}
          </div>
        </div>
      `:''}

      <button id="restart-game" class="kingdom-btn px-6 py-3 font-display font-bold">重新挑戰</button>
    </div>
  `;
  document.getElementById('restart-game').addEventListener('click', startGame);
}

  {t:'寫關鍵字，不寫整句', d:'特徵盡量濃縮成 2～6 個字的關鍵詞，例如「無細胞核」「具維管束」，不要照抄課本整句話。'},

            ${KINGDOMS.map((k,i)=>{
              const angle = (Math.PI*2/5)*i - Math.PI/2;

              const sx2=x2+Math.cos(angle2)*34, sy2=y2+Math.sin(angle2)*34;
              const sx3=x2+Math.cos(angle3)*34, sy3=y2+Math.sin(angle3)*34;

                <line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${k.color}" stroke-width="3" stroke-linecap="round"/>

                <line x1="${x2}" y1="${y2}" x2="${sx3}" y2="${sy3}" stroke="${k.color}" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>

  `;
}
