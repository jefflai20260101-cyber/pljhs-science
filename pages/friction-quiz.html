<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>摩擦力互動題庫</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; padding: 16px;
    font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
    background: linear-gradient(135deg, #eef2ff 0%, #f0fdfa 100%);
    color: #1e293b; min-height: 100vh;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  header {
    display: flex; justify-content: space-between; align-items: center;
    background: #4f46e5; color: #fff; padding: 16px 22px; border-radius: 18px;
    box-shadow: 0 6px 18px rgba(79,70,229,.3); margin-bottom: 18px;
  }
  header h1 { margin: 0; font-size: 24px; font-weight: 800; }
  .score {
    background: rgba(255,255,255,.2); padding: 8px 16px; border-radius: 12px;
    font-size: 18px; font-weight: 700; white-space: nowrap;
  }
  .card { background: #fff; border-radius: 20px; padding: 22px; box-shadow: 0 4px 20px rgba(0,0,0,.07); }
  .qtag {
    display: inline-block; background: #e0e7ff; color: #4338ca;
    font-size: 16px; font-weight: 700; padding: 6px 14px; border-radius: 999px; margin-bottom: 6px;
  }
  .qno { color: #64748b; font-size: 16px; font-weight: 700; margin-left: 8px; }
  .visual {
    background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 16px;
    padding: 14px; margin: 16px 0; text-align: center; overflow-x: auto;
  }
  .visual svg { max-width: 100%; height: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 19px; }
  th, td { border: 2px solid #cbd5e1; padding: 12px 8px; text-align: center; }
  th { background: #4f46e5; color: #fff; font-weight: 800; }
  tbody tr:nth-child(even) { background: #f1f5f9; }
  .qtext { font-size: 22px; font-weight: 700; line-height: 1.5; margin: 14px 0 4px; }
  .options { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
  .opt {
    display: flex; align-items: center; gap: 14px;
    background: #f8fafc; border: 3px solid #e2e8f0; border-radius: 16px;
    padding: 16px 18px; font-size: 21px; font-weight: 600; cursor: pointer;
    text-align: left; transition: all .12s; min-height: 64px; color: #1e293b;
  }
  .opt:active { transform: scale(.98); }
  .opt .letter {
    flex-shrink: 0; width: 38px; height: 38px; border-radius: 50%;
    background: #c7d2fe; color: #3730a3; font-weight: 800;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
  }
  .opt.selected { background: #312e81; border-color: #312e81; color: #fff; }
  .opt.selected .letter { background: #fff; color: #312e81; }
  .opt.correct { background: #dcfce7; border-color: #16a34a; color: #14532d; }
  .opt.correct .letter { background: #16a34a; color: #fff; }
  .opt.wrong { background: #fee2e2; border-color: #dc2626; color: #7f1d1d; }
  .opt.wrong .letter { background: #dc2626; color: #fff; }
  .opt:disabled { cursor: default; }
  .feedback { margin-top: 18px; padding: 16px 18px; border-radius: 14px; font-size: 19px; line-height: 1.6; display: none; }
  .feedback.show { display: block; }
  .feedback.ok { background: #dcfce7; color: #166534; border: 2px solid #22c55e; }
  .feedback.no { background: #fef2f2; color: #991b1b; border: 2px solid #ef4444; }
  .feedback b { font-weight: 800; }
  .nextbtn {
    width: 100%; margin-top: 18px; padding: 18px; font-size: 22px; font-weight: 800;
    color: #fff; background: #0d9488; border: none; border-radius: 16px; cursor: pointer;
    box-shadow: 0 4px 12px rgba(13,148,136,.35); transition: all .12s;
  }
  .nextbtn:active { transform: scale(.98); }
  .nextbtn:hover { background: #0f766e; }
  .lbl { font-size: 15px; fill: #475569; font-weight: 700; }
  .axis { stroke: #475569; stroke-width: 2.5; }
  .gridtxt { font-size: 13px; fill: #64748b; }
  .result-icon { font-size: 72px; text-align: center; line-height: 1; }
  .result-level { text-align: center; font-size: 32px; font-weight: 800; margin: 8px 0 4px; }
  .result-score { text-align: center; font-size: 22px; font-weight: 700; color: #475569; }
  .result-msg { text-align: center; font-size: 18px; color: #64748b; margin: 10px 0 4px; }
  .summary { margin-top: 22px; border-top: 2px dashed #cbd5e1; padding-top: 18px; }
  .summary h3 { font-size: 22px; margin: 0 0 14px; color: #1e293b; }
  .sumblock { margin-bottom: 16px; }
  .sumblock p { font-size: 18px; line-height: 1.65; margin: 8px 0 0; color: #334155; }
  .sumblock b { color: #4338ca; font-weight: 800; }
  .sumtag { display: inline-block; font-size: 15px; font-weight: 700; padding: 4px 12px; border-radius: 999px; color: #fff; }
  .sumtag.a { background: #4f46e5; }
  .sumtag.b { background: #0d9488; }
  .sumtag.c { background: #db2777; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>⚖️ 摩擦力互動題庫</h1>
    <div class="score">答對 <span id="correct">0</span> / <span id="total">0</span></div>
  </header>

  <div class="card" id="quizCard">
    <div>
      <span class="qtag" id="qtag">題型</span>
      <span class="qno" id="qno">第 1 / 6 題</span>
    </div>
    <div class="visual" id="visual"></div>
    <div class="qtext" id="qtext"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="nextbtn" id="nextbtn">下一題 ➜</button>
  </div>

  <div class="card" id="resultCard" style="display:none">
    <div class="result-icon" id="rIcon">🏆</div>
    <div class="result-level" id="rLevel">等級</div>
    <div class="result-score" id="rScore">答對 0 / 6 題</div>
    <div class="result-msg" id="rMsg"></div>
    <div class="summary">
      <h3>📘 重點整理</h3>
      <div class="sumblock">
        <span class="sumtag a">題型A · 雙向施力</span>
        <p>物體靜止時水平合力為零，靜摩擦力大小 = 兩施力之差 <b>|F₁−F₂|</b>，方向與「較大施力」相反（朝較小力的一側）。</p>
      </div>
      <div class="sumblock">
        <span class="sumtag b">題型B · 圖形判讀</span>
        <p>靜止時靜摩擦力會「自動調整」為 = 施力（斜線段）;施力一旦<b>超過最大靜摩擦力（轉折點）</b>物體開始滑動，之後改受較小且固定的<b>動摩擦力</b>（水平段）。</p>
      </div>
      <div class="sumblock">
        <span class="sumtag c">題型C · 表格推論</span>
        <p>比較推力與最大靜摩擦力:推力 ≤ 最大靜摩擦力 → <b>靜止</b>，摩擦力 = 推力;推力 > 最大靜摩擦力 → <b>運動</b>，摩擦力 = <b>動摩擦力</b>(固定值)。</p>
      </div>
    </div>
    <button class="nextbtn" id="restartBtn" style="background:#4f46e5">🔄 再做一次</button>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
const randMul = (min, max, step) => {
  const lo = Math.ceil(min / step), hi = Math.floor(max / step);
  return rand(lo, hi) * step;
};
function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
// 字串選項（題型A，含方向）：去重後洗牌
function buildOptions(opts, correctLabel) {
  const seen = new Set(), uniq = [];
  for (const o of opts) { if (!seen.has(o)) { seen.add(o); uniq.push(o); } }
  shuffle(uniq);
  return { options: uniq, correctIndex: uniq.indexOf(correctLabel) };
}
// 數值選項（題型B、C）：保證 4 個相異數字
function fourNums(correct, distractors, fallbackBase) {
  const set = new Set([correct]);
  for (const d of distractors) {
    if (set.size >= 4) break;
    if (Number.isFinite(d) && d > 0) set.add(d);
  }
  let k = 1;
  while (set.size < 4 && k < 60) {
    const v = (fallbackBase || 10) + k * 5;
    if (v > 0) set.add(v);
    k++;
  }
  const arr = shuffle([...set]);
  return { options: arr.map(n => `${n} gw`), correctIndex: arr.indexOf(correct) };
}

const arrowDefs = `<defs>
  <marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/>
  </marker>
</defs>`;

/* ---------- 題型 A：雙向施力求靜摩擦力 ---------- */
function genA() {
  let W, F1, F2, correct, built;
  do {
    W = randMul(100, 800, 50);
    F1 = rand(10, 50);
    do { F2 = rand(10, 50); } while (F2 === F1);
    const diff = Math.abs(F1 - F2);
    const fricDir = (F2 > F1) ? "向左" : "向右";
    correct = `${diff} gw，${fricDir}`;
    const dirs = ["向左", "向右"];
    built = buildOptions([
      correct,
      `0 gw`,
      `${F1 + F2} gw，${dirs[rand(0,1)]}`,
      `${diff * 2} gw，${dirs[rand(0,1)]}`
    ], correct);
  } while (built.options.length < 4);

  const diff = Math.abs(F1 - F2);
  const fricDir = (F2 > F1) ? "向左" : "向右";
  const bigSide = (F2 > F1) ? "右" : "左";

  // 箭頭從物體左右邊緣（作用點）畫出
  const svg = `<svg viewBox="0 0 400 180" xmlns="http://www.w3.org/2000/svg">
    ${arrowDefs}
    <line x1="20" y1="150" x2="380" y2="150" class="axis"/>
    ${Array.from({length:18},(_,i)=>`<line x1="${22+i*20}" y1="150" x2="${14+i*20}" y2="160" stroke="#94a3b8" stroke-width="1.5"/>`).join("")}
    <rect x="160" y="108" width="80" height="42" rx="4" fill="#a5b4fc" stroke="#4338ca" stroke-width="2.5"/>
    <text x="200" y="134" text-anchor="middle" font-size="15" font-weight="700" fill="#312e81">W=${W}gw</text>
    <line x1="160" y1="129" x2="82" y2="129" class="axis" stroke="#dc2626" marker-end="url(#ah)"/>
    <text x="118" y="118" text-anchor="middle" class="lbl" fill="#dc2626">F₁=${F1}gw（左）</text>
    <line x1="240" y1="129" x2="318" y2="129" class="axis" stroke="#dc2626" marker-end="url(#ah)"/>
    <text x="282" y="118" text-anchor="middle" class="lbl" fill="#dc2626">F₂=${F2}gw（右）</text>
  </svg>`;

  return {
    tag: "題型A · 雙向施力",
    visual: svg,
    qtext: `物體靜止在桌面上，左方施力 F₁ = ${F1} gw、右方施力 F₂ = ${F2} gw。求物體所受摩擦力的大小與方向。`,
    options: built.options,
    correctIndex: built.correctIndex,
    explain: `物體靜止，水平方向合力為零。淨施力 = |F₁−F₂| = <b>${diff} gw</b>，方向朝施力較大的「${bigSide}」側；靜摩擦力與淨施力大小相等、方向相反，故摩擦力 = <b>${diff} gw，${fricDir}</b>（朝施力較小的一側）。`
  };
}

/* ---------- 題型 B：圖形判讀（含輔助線，三種問法） ---------- */
function genB() {
  const W = randMul(100, 500, 100);
  const fsMax = randMul(20, 60, 5);
  const fk = Math.round(fsMax * (0.6 + Math.random() * 0.2));

  const ox = 58, oy = 235, pw = 285, ph = 195;
  const xMax = Math.ceil((fsMax * 1.55) / 10) * 10;
  const yMax = Math.ceil((fsMax * 1.25) / 10) * 10;
  const sx = pw / xMax, sy = ph / yMax;
  const X = v => ox + v * sx, Y = v => oy - v * sy;

  let ticks = "";
  for (let t = 10; t <= xMax; t += 10)
    ticks += `<line x1="${X(t)}" y1="${oy}" x2="${X(t)}" y2="${oy+5}" class="axis" stroke-width="1.5"/><text x="${X(t)}" y="${oy+20}" text-anchor="middle" class="gridtxt">${t}</text>`;
  for (let t = 10; t <= yMax; t += 10)
    ticks += `<line x1="${ox}" y1="${Y(t)}" x2="${ox-5}" y2="${Y(t)}" class="axis" stroke-width="1.5"/><text x="${ox-9}" y="${Y(t)+5}" text-anchor="end" class="gridtxt">${t}</text>`;

  // 輔助線：從指定點拉橘色虛線對到 X 軸與 Y 軸
  const guide = (dx, dy) => {
    const px = X(dx), py = Y(dy);
    return `<line x1="${px}" y1="${py}" x2="${px}" y2="${oy}" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,4"/>`
      + `<line x1="${px}" y1="${py}" x2="${ox}" y2="${py}" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,4"/>`
      + `<circle cx="${px}" cy="${py}" r="5.5" fill="#f59e0b" stroke="#fff" stroke-width="1.5"/>`;
  };

  const baseCurve =
    `<line x1="${X(0)}" y1="${Y(0)}" x2="${X(fsMax)}" y2="${Y(fsMax)}" stroke="#4f46e5" stroke-width="3.5"/>`
    + `<line x1="${X(fsMax)}" y1="${Y(fsMax)}" x2="${X(fsMax)}" y2="${Y(fk)}" stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="5,4"/>`
    + `<line x1="${X(fsMax)}" y1="${Y(fk)}" x2="${X(xMax)}" y2="${Y(fk)}" stroke="#0d9488" stroke-width="3.5"/>`;

  const variant = rand(0, 2);
  let qtext, qInfo, correctNum, distractors, explain;

  if (variant === 0) {
    qtext = `重 ${W} gw 的物體置於桌面，摩擦力與施力關係如圖。若要使物體「開始移動」，至少需施多少水平力？`;
    qInfo = guide(fsMax, fsMax);
    correctNum = fsMax;
    distractors = [fk, fsMax - 5, fsMax + 10];
    explain = `施力未達最大靜摩擦力前物體不動;要使物體開始移動，施力必須超過<b>轉折點（最大靜摩擦力 = ${fsMax} gw）</b>，之後降為動摩擦力 ${fk} gw。故至少需 <b>${fsMax} gw</b>。`;
  } else if (variant === 1) {
    const Fq = randMul(10, fsMax - 5, 5);
    qtext = `重 ${W} gw 的物體置於桌面，摩擦力與施力關係如圖。當水平施力為 ${Fq} gw（物體仍靜止）時，物體所受的摩擦力為多少？`;
    qInfo = guide(Fq, Fq);
    correctNum = Fq;
    distractors = [fsMax, fk, Fq + 5];
    explain = `物體靜止時，靜摩擦力會「自動調整」為與施力大小相等（圖中斜線：摩擦力 = 施力）。施力 ${Fq} gw 尚未超過最大靜摩擦力 ${fsMax} gw，物體不動，故摩擦力 = <b>${Fq} gw</b>。`;
  } else {
    const Fq = fsMax + rand(3, 6);
    qtext = `重 ${W} gw 的物體置於桌面，摩擦力與施力關係如圖。當水平施力為 ${Fq} gw 使物體「持續滑動」時，物體所受的摩擦力為多少？`;
    qInfo = guide(Fq, fk);
    correctNum = fk;
    distractors = [fsMax, Fq, fsMax + 8];
    explain = `施力 ${Fq} gw 已超過最大靜摩擦力 ${fsMax} gw，物體持續滑動，此時受固定的<b>動摩擦力 ${fk} gw</b>（圖中水平線）。`;
  }

  const { options, correctIndex } = fourNums(correctNum, distractors, fsMax);

  const svg = `<svg viewBox="0 0 380 270" xmlns="http://www.w3.org/2000/svg">
    <line x1="${ox}" y1="${oy}" x2="${ox+pw+12}" y2="${oy}" class="axis"/>
    <line x1="${ox}" y1="${oy}" x2="${ox}" y2="${oy-ph-12}" class="axis"/>
    ${ticks}
    <text x="${ox+pw/2}" y="265" text-anchor="middle" class="lbl">施力 F (gw) →</text>
    <text x="18" y="${oy-ph/2}" text-anchor="middle" class="lbl" transform="rotate(-90 18 ${oy-ph/2})">摩擦力 (gw)</text>
    ${baseCurve}
    ${qInfo}
  </svg>`;

  return { tag: "題型B · 圖形判讀", visual: svg, qtext, options, correctIndex, explain };
}

/* ---------- 題型 C：表格推論摩擦力（只有 1 個選項 < 最大靜摩擦力） ---------- */
function genC() {
  const fsMax = rand(12, 20);
  const fk = Math.round(fsMax * (0.6 + Math.random() * 0.2));
  const Fask = fsMax + rand(2, 6);
  let a = Math.max(2, Math.round(fsMax * 0.3));
  let b = Math.round(fsMax * 0.65);
  if (b <= a) b = a + 2;
  if (b >= fsMax) b = fsMax - 1;

  // 四選項中僅正確答案（動摩擦力 fk）小於最大靜摩擦力，其餘皆 ≥ fsMax
  const { options, correctIndex } = fourNums(fk, [fsMax, Fask, Fask + 2], fsMax);

  const rows = [
    [0, "靜止不動"],
    [a, "靜止不動"],
    [b, "靜止不動"],
    [fsMax, "即將開始移動（臨界）"],
    [Fask, "持續加速運動"]
  ];
  const table = `<table>
    <thead><tr><th>水平推力 (gw)</th><th>物體運動狀態</th></tr></thead>
    <tbody>${rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join("")}</tbody>
  </table>`;

  return {
    tag: "題型C · 表格推論",
    visual: table,
    qtext: `根據上表，當水平推力為 ${Fask} gw 時，物體所受的摩擦力為多少？`,
    options,
    correctIndex,
    explain: `由表可知最大靜摩擦力為 <b>${fsMax} gw</b>（推力達 ${fsMax} gw 時即將移動）。推力 ${Fask} gw > ${fsMax} gw，物體<b>已在運動中</b>，此時摩擦力為<b>動摩擦力 ${fk} gw</b>，而非靜摩擦力。`
  };
}

/* ---------- 測驗流程 ---------- */
const TOTAL = 6;
let queue = [], pos = 0, correctCount = 0, answeredCount = 0, answered = false, current = null;

function buildQueue() {
  const gens = [genA, genA, genB, genB, genC, genC];
  shuffle(gens);
  queue = gens.map(g => g());
}

function getLevel(score) {
  if (score >= 6) return { icon: "🏆", name: "摩擦力大師", color: "#f59e0b", msg: "全部答對，觀念非常扎實！" };
  if (score >= 4) return { icon: "⭐", name: "熟練高手", color: "#4f46e5", msg: "表現很好，再加把勁就滿分囉！" };
  if (score >= 2) return { icon: "💪", name: "穩定學徒", color: "#0d9488", msg: "已掌握基本觀念，多練習會更穩！" };
  return { icon: "🌱", name: "初學新手", color: "#64748b", msg: "別灰心，看完重點整理再挑戰一次！" };
}

function startQuiz() {
  buildQueue();
  pos = 0; correctCount = 0; answeredCount = 0;
  $("quizCard").style.display = "block";
  $("resultCard").style.display = "none";
  $("correct").textContent = 0;
  $("total").textContent = 0;
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  current = queue[pos];
  $("qtag").textContent = current.tag;
  $("qno").textContent = `第 ${pos + 1} / ${TOTAL} 題`;
  $("visual").innerHTML = current.visual;
  $("qtext").textContent = current.qtext;
  $("nextbtn").textContent = (pos === TOTAL - 1) ? "看結果 🏁" : "下一題 ➜";
  const letters = ["A", "B", "C", "D"];
  const box = $("options");
  box.innerHTML = "";
  current.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => choose(i);
    box.appendChild(btn);
  });
  const fb = $("feedback");
  fb.className = "feedback";
  fb.innerHTML = "";
}

function choose(i) {
  if (answered) return;
  answered = true;
  answeredCount++;
  const btns = $("options").querySelectorAll(".opt");
  const ci = current.correctIndex;
  btns.forEach((b, idx) => {
    b.disabled = true;
    if (idx === i) b.classList.add("selected");
  });
  const fb = $("feedback");
  if (i === ci) {
    correctCount++;
    btns[i].classList.remove("selected");
    btns[i].classList.add("correct");
    fb.className = "feedback show ok";
    fb.innerHTML = `<b>答對了！✅</b><br>${current.explain}`;
  } else {
    btns[i].classList.add("wrong");
    btns[ci].classList.add("correct");
    fb.className = "feedback show no";
    fb.innerHTML = `<b>答錯了 ❌　正確答案：${["A","B","C","D"][ci]}　${current.options[ci]}</b><br>${current.explain}`;
  }
  $("correct").textContent = correctCount;
  $("total").textContent = answeredCount;
}

function showResult() {
  const lv = getLevel(correctCount);
  $("rIcon").textContent = lv.icon;
  $("rLevel").textContent = lv.name;
  $("rLevel").style.color = lv.color;
  $("rScore").textContent = `答對 ${correctCount} / ${TOTAL} 題`;
  $("rMsg").textContent = lv.msg;
  $("quizCard").style.display = "none";
  $("resultCard").style.display = "block";
}

$("nextbtn").onclick = () => {
  if (!answered) return;
  if (pos === TOTAL - 1) { showResult(); return; }
  pos++;
  loadQuestion();
};
$("restartBtn").onclick = startQuiz;

startQuiz();
</script>
</body>
</html>
