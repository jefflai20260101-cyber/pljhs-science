<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電解質大師：雙重鑑定挑戰</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,"Noto Sans TC",sans-serif;background:#f0f4f8;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1rem;font-size:16px;}
#app{width:100%;max-width:580px;}
button{cursor:pointer;font-family:inherit;}
.hidden{display:none!important;}

/* ── 標題 ── */
#screen-title{background:linear-gradient(135deg,#e74c3c 0%,#c0392b 40%,#2980b9 100%);border-radius:20px;padding:2.5rem 2rem;display:flex;flex-direction:column;align-items:center;gap:18px;text-align:center;min-height:440px;justify-content:center;}
.t-icon{font-size:64px;line-height:1;}
.t-main{font-size:30px;font-weight:800;color:#fff;letter-spacing:2px;}
.t-sub{font-size:16px;color:rgba(255,255,255,0.85);margin-top:4px;}
.t-desc{background:rgba(255,255,255,0.15);border-radius:12px;padding:14px 20px;max-width:340px;color:#fff;font-size:15px;line-height:1.9;}
.t-rules{background:rgba(255,255,255,0.12);border-radius:10px;padding:12px 18px;font-size:14px;color:rgba(255,255,255,0.9);line-height:2;max-width:320px;}
.btn-start{background:#f1c40f;border:none;border-radius:30px;padding:14px 48px;font-size:20px;font-weight:800;color:#2c3e50;letter-spacing:1px;transition:transform .1s;}
.btn-start:hover{transform:scale(1.05);}

/* ── 遊戲 ── */
#screen-game{padding:4px 0;}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.hdr-left{font-size:15px;color:#666;}
.hdr-right{display:flex;align-items:center;gap:14px;}
.hdr-timer{font-size:15px;font-weight:700;color:#f39c12;}
.hdr-score{font-size:16px;font-weight:800;color:#8e44ad;}
.progress-strip{display:flex;gap:4px;margin-bottom:14px;}
.pstrip-seg{flex:1;height:7px;border-radius:4px;background:#ddd;transition:background .3s;}
.pstrip-seg.done{background:#27ae60;}
.spirit-card{border-radius:18px;padding:20px 20px 16px;margin-bottom:14px;position:relative;overflow:hidden;}
.sp-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:12px;}
.sp-avatar-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0;}
.sp-avatar{width:96px;height:96px;border-radius:16px;overflow:hidden;}
.sp-avatar svg{width:100%;height:100%;}
.litmus-hint{display:flex;gap:6px;justify-content:center;}
.litmus-strip{border-radius:4px;padding:3px 6px;font-size:10px;font-weight:700;color:#fff;text-align:center;line-height:1.3;min-width:42px;}
.litmus-blue{background:#1565c0;}
.litmus-red{background:#b71c1c;}
.litmus-neutral{background:#546e7a;}
.sp-phase{font-size:13px;color:#666;margin-bottom:3px;}
.sp-title{font-size:18px;font-weight:800;}
.sp-hint{font-size:13px;color:#555;margin-top:4px;line-height:1.6;}
.mistake-bar{font-size:13px;color:#e74c3c;margin-bottom:7px;}
.fb{border-radius:9px;padding:10px 14px;font-size:14px;line-height:1.7;margin-bottom:9px;border:1px solid;}
.fb.success{background:#d5f5e3;border-color:#27ae60;color:#1a7a4a;}
.fb.fail{background:#fadbd8;border-color:#e74c3c;color:#c0392b;}
.captured-inner{text-align:center;}
.cap-avatar{width:110px;height:110px;margin:0 auto 10px;border-radius:18px;overflow:hidden;}
.cap-avatar svg{width:100%;height:100%;}
.cap-title-lbl{font-size:13px;font-weight:600;margin-bottom:2px;}
.cap-name{font-size:21px;font-weight:800;}
.cap-formula{font-size:15px;color:#666;margin-bottom:10px;}
.cap-score-row{background:rgba(255,255,255,0.8);border-radius:10px;padding:9px 14px;margin-bottom:10px;display:flex;justify-content:center;gap:20px;font-size:14px;}
.cap-note{background:rgba(255,255,255,0.7);border-radius:10px;padding:11px 14px;font-size:14px;color:#2c3e50;text-align:left;line-height:1.9;}
.cap-note b{color:#e67e22;}
.btn-next-spirit{margin-top:14px;border:none;border-radius:22px;padding:11px 30px;color:#fff;font-weight:700;font-size:15px;}
.fruit-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.fruit-btn{border-radius:16px;padding:16px 8px;text-align:center;border-width:2px;border-style:solid;background:transparent;transition:transform .12s;}
.fruit-btn:hover{transform:scale(1.04);}
.fruit-emoji{font-size:36px;}
.fruit-label{font-size:13px;font-weight:800;margin-top:5px;}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.action-btn{border-radius:16px;padding:18px 14px;text-align:center;font-size:14px;font-weight:700;line-height:1.6;background:#fff;border-width:2px;border-style:solid;transition:transform .12s;}
.action-btn:hover{transform:scale(1.04);}

/* ── 結算 ── */
#screen-complete{background:#fff;border-radius:20px;padding:2rem;}
.comp-top{text-align:center;margin-bottom:18px;}
.comp-icon{font-size:56px;margin-bottom:8px;}
.comp-title{font-size:24px;font-weight:800;color:#2c3e50;}
.comp-score{font-size:30px;font-weight:800;margin:10px 0;}
.rank-badge{display:inline-block;border-radius:20px;padding:6px 22px;font-size:16px;font-weight:700;color:#fff;margin-bottom:8px;}
.comp-pct{font-size:14px;color:#888;margin-top:4px;}
.score-bar-wrap{background:#f0f4f8;border-radius:10px;height:18px;overflow:hidden;margin-bottom:22px;}
.score-bar-fill{background:linear-gradient(90deg,#e74c3c,#f1c40f);height:100%;border-radius:10px;transition:width 1.2s;}
.breakdown-title{font-size:14px;font-weight:700;color:#555;margin-bottom:9px;}
.breakdown-list{display:flex;flex-direction:column;gap:7px;margin-bottom:20px;}
.breakdown-row{display:flex;align-items:center;gap:10px;background:#f8f9fa;border-radius:10px;padding:9px 13px;}
.bdr-name{flex:1;font-size:14px;font-weight:600;color:#2c3e50;}
.bdr-mistakes{font-size:13px;color:#e74c3c;min-width:52px;}
.bdr-time{font-size:13px;color:#888;min-width:48px;}
.bdr-pts{font-size:15px;font-weight:800;min-width:44px;text-align:right;}
.dex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(82px,1fr));gap:10px;margin-bottom:22px;}
.dex-card{border-radius:14px;padding:10px 6px;text-align:center;}
.dex-title-lbl{font-size:10px;color:#888;margin-bottom:1px;}
.dex-name{font-size:11px;font-weight:700;}
.btn-restart{background:#e74c3c;border:none;border-radius:24px;padding:12px 36px;font-size:16px;font-weight:700;color:#fff;display:block;margin:0 auto;}

/* ── 魔王關卡 ── */
#screen-boss{padding:4px 0;}
.boss-bg{background:linear-gradient(160deg,#0d0d1a 0%,#1a0a2e 50%,#0d0d1a 100%);border-radius:20px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden;}
.boss-bg::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(138,43,226,0.04) 2px,rgba(138,43,226,0.04) 4px);pointer-events:none;}
.boss-header{text-align:center;margin-bottom:16px;}
.boss-label{font-size:11px;font-weight:700;color:#ff6b6b;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;}
.boss-name{font-size:22px;font-weight:800;color:#fff;text-shadow:0 0 20px rgba(200,100,255,0.8);}
.boss-avatar-wrap{display:flex;justify-content:center;margin-bottom:14px;position:relative;}
.boss-avatar{width:120px;height:120px;border-radius:20px;overflow:hidden;border:2px solid rgba(200,100,255,0.5);box-shadow:0 0 30px rgba(200,100,255,0.4);}
.boss-avatar svg{width:100%;height:100%;}
@keyframes bossShake{0%,100%{transform:translateX(0);}20%{transform:translateX(-4px);}40%{transform:translateX(4px);}60%{transform:translateX(-3px);}80%{transform:translateX(3px);}}
.boss-avatar.shake{animation:bossShake 0.4s ease;}
/* 魔王血條 */
.boss-hp-wrap{margin-bottom:14px;}
.boss-hp-label{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:#e0b0ff;margin-bottom:6px;}
.boss-hp-track{background:rgba(255,255,255,0.1);border-radius:8px;height:20px;overflow:hidden;border:1px solid rgba(200,100,255,0.3);}
.boss-hp-fill{height:100%;border-radius:8px;transition:width 0.6s ease;background:linear-gradient(90deg,#7b2ff7,#c850c0,#ff6b6b);box-shadow:0 0 12px rgba(200,100,255,0.6);}
/* 題目進度 */
.boss-progress{display:flex;gap:6px;justify-content:center;margin-bottom:14px;}
.boss-dot{width:28px;height:28px;border-radius:50%;border:2px solid rgba(200,100,255,0.4);display:flex;align-items:center;justify-content:center;font-size:12px;color:rgba(255,255,255,0.4);font-weight:700;transition:all 0.3s;}
.boss-dot.done{background:#27ae60;border-color:#27ae60;color:#fff;box-shadow:0 0 8px rgba(39,174,96,0.6);}
.boss-dot.current{border-color:#f1c40f;color:#f1c40f;box-shadow:0 0 8px rgba(241,196,15,0.6);}
/* 題目卡 */
.boss-q-card{background:rgba(255,255,255,0.06);border:1px solid rgba(200,100,255,0.25);border-radius:14px;padding:16px;margin-bottom:12px;}
.boss-q-num{font-size:11px;font-weight:700;color:#c850c0;letter-spacing:2px;margin-bottom:6px;}
.boss-q-text{font-size:15px;font-weight:600;color:#f0e6ff;line-height:1.7;}
.boss-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.boss-opt{border-radius:12px;padding:12px 10px;text-align:center;font-size:13px;font-weight:700;line-height:1.5;background:rgba(255,255,255,0.06);border:2px solid rgba(200,100,255,0.3);color:#e0d0ff;transition:all .15s;}
.boss-opt:hover{background:rgba(200,100,255,0.15);border-color:#c850c0;transform:scale(1.02);}
.boss-opt.correct{background:rgba(39,174,96,0.25);border-color:#27ae60;color:#a8f0c6;}
.boss-opt.wrong{background:rgba(231,76,60,0.25);border-color:#e74c3c;color:#ffb3b3;}
.boss-fb{border-radius:10px;padding:10px 14px;font-size:13px;line-height:1.7;margin-top:10px;border:1px solid;}
.boss-fb.success{background:rgba(39,174,96,0.15);border-color:#27ae60;color:#a8f0c6;}
.boss-fb.fail{background:rgba(231,76,60,0.15);border-color:#e74c3c;color:#ffb3b3;}
.boss-fb.counterattack{background:rgba(231,76,60,0.2);border-color:#ff4500;color:#ffcc99;animation:pulse 0.5s ease;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
/* 魔王結語 */
.boss-victory{text-align:center;padding:10px 0;}
.boss-god-avatar{width:140px;height:140px;margin:0 auto 12px;border-radius:24px;overflow:hidden;border:3px solid #f1c40f;box-shadow:0 0 40px rgba(241,196,15,0.6);}
.boss-god-avatar svg{width:100%;height:100%;}
.boss-victory-title{font-size:24px;font-weight:800;color:#f1c40f;text-shadow:0 0 20px rgba(241,196,15,0.8);margin-bottom:6px;}
.boss-victory-sub{font-size:14px;color:#e0d0ff;margin-bottom:16px;line-height:1.8;}
.boss-victory-note{background:rgba(241,196,15,0.1);border:1px solid rgba(241,196,15,0.4);border-radius:12px;padding:12px 16px;font-size:13px;color:#ffeaa0;text-align:left;line-height:1.9;margin-bottom:16px;}
.boss-score-row{display:flex;justify-content:center;gap:20px;font-size:14px;color:#e0d0ff;margin-bottom:12px;}
</style>
</head>
<body>
<div id="app">
  <div id="screen-title">
    <div class="t-icon">⚡</div>
    <div><div class="t-main">電解質大師</div><div class="t-sub">雙重鑑定挑戰</div></div>
    <div class="t-desc">在草叢中遇見 11 種神祕精靈！先用正確果實安撫，再用特質動作收服！<br><span style="color:#f1c40f;font-weight:700;">⏱ 越快越準，得分越高！滿分 1650 分</span></div>
    <div class="t-rules">✅ 每隻基礎分：100 分<br>⏱ 時間獎勵：最多 +50 分（每 5 秒 −5 分）<br>❌ 每次答錯：−20 分</div>
    <button class="btn-start" id="btn-start">開始冒險！</button>
  </div>

  <div id="screen-game" class="hidden">
    <div class="hdr">
      <div class="hdr-left">已收服 <span id="captured-count" style="font-weight:700;color:#e74c3c;">0</span>/11</div>
      <div class="hdr-right">
        <div class="hdr-timer">⏱ <span id="timer-display">0</span>s</div>
        <div class="hdr-score">⚡ <span id="score-display">0</span>分</div>
      </div>
    </div>
    <div class="progress-strip" id="progress-strip"></div>
    <div class="spirit-card" id="spirit-card"></div>
    <div id="choices-area"></div>
  </div>

  <!-- 魔王關卡 -->
  <div id="screen-boss" class="hidden">
    <div class="boss-bg">
      <div class="boss-header">
        <div class="boss-label">⚠ 最終決戰 ⚠</div>
        <div class="boss-name">電解質究極神獸</div>
      </div>
      <div class="boss-avatar-wrap">
        <div class="boss-avatar" id="boss-avatar-el"></div>
      </div>
      <div class="boss-hp-wrap">
        <div class="boss-hp-label">
          <span>💜 魔王生命值</span>
          <span id="boss-hp-text">7 / 7</span>
        </div>
        <div class="boss-hp-track">
          <div class="boss-hp-fill" id="boss-hp-fill" style="width:100%"></div>
        </div>
      </div>
      <div class="boss-progress" id="boss-progress"></div>
      <div id="boss-q-area"></div>
    </div>
  </div>

  <div id="screen-complete" class="hidden">
    <div class="comp-top">
      <div class="comp-icon" id="comp-icon"></div>
      <div class="comp-title">全部收服成功！</div>
      <div class="comp-score" id="comp-score"></div>
      <div class="rank-badge" id="rank-badge"></div>
      <div class="comp-pct" id="comp-pct"></div>
    </div>
    <div class="score-bar-wrap"><div class="score-bar-fill" id="score-bar-fill" style="width:0%"></div></div>
    <div class="breakdown-title">📋 各精靈得分明細</div>
    <div class="breakdown-list" id="breakdown-list"></div>
    <div class="dex-grid" id="dex-grid"></div>
    <button class="btn-restart" id="btn-restart">再挑戰一次</button>
  </div>
</div>

function makeLitmusHint(type){
  var div=document.createElement('div');div.className='litmus-hint';
  if(type==='acid'){
    div.innerHTML='<div class="litmus-strip litmus-blue">藍試紙<br>變紅</div><div class="litmus-strip litmus-red">紅試紙<br>不變</div>';
  } else if(type==='base'||type==='salt_base'){
    div.innerHTML='<div class="litmus-strip litmus-red">紅試紙<br>變藍</div><div class="litmus-strip litmus-blue">藍試紙<br>不變</div>';
  } else {
    div.innerHTML='<div class="litmus-strip litmus-neutral">試紙<br>不變色</div>';
  }
  return div;
}

  {id:"CaSO4",name:"硫酸鈣",formula:"CaSO₄",title:"石膏傀儡",type:"neutral",color:"#455a64",bgColor:"#eceff1",correctFruit:"neutral",phase1Hint:"中性精靈，微溶於水，加熱後能固化",actions:[{text:"石膏固化（微溶固定）",correct:true},{text:"貝殼硬殼防禦",correct:false}],failReason:"貝殼主成分是碳酸鈣；硫酸鈣的特性是石膏固化！",studyNote:"硫酸鈣（CaSO₄）俗稱石膏，微溶於水，工業上用於製造建材、醫療石膏繃帶。"},
  {id:"CaCO3",name:"碳酸鈣",formula:"CaCO₃",title:"貝殼武士",type:"neutral",color:"#e65100",bgColor:"#fff8e1",correctFruit:"neutral",phase1Hint:"中性精靈，是貝殼和大理石的主成分",actions:[{text:"潑灑稀鹽酸（產CO₂）",correct:true},{text:"溶解在水中",correct:false}],failReason:"碳酸鈣幾乎不溶於水！但遇稀鹽酸會產生CO₂氣泡。",studyNote:"碳酸鈣（CaCO₃）是貝殼、大理石的主成分，與稀鹽酸反應產CO₂↑"},
  {id:"Na2CO3",name:"碳酸鈉",formula:"Na₂CO₃",title:"玻璃魔法師",type:"salt_base",color:"#004d40",bgColor:"#e0f2f1",correctFruit:"base",phase1Hint:"鹽類精靈，但水溶液呈鹼性，需鹼性果實安撫",actions:[{text:"製造玻璃（蘇打）",correct:true},{text:"烘焙麵糰",correct:false}],failReason:"烘焙用小蘇打（NaHCO₃）！碳酸鈉是製造玻璃的原料。",studyNote:"碳酸鈉（Na₂CO₃）俗稱蘇打，水溶液呈鹼性，是製造玻璃、肥皂的重要原料。"},
  {id:"NaHCO3",name:"碳酸氫鈉",formula:"NaHCO₃",title:"泡泡廚師",type:"salt_base",color:"#00695c",bgColor:"#e0f2f1",correctFruit:"base",phase1Hint:"鹽類精靈，水溶液也呈鹼性，加熱會分解產氣",actions:[{text:"受熱產氣（小蘇打）",correct:true},{text:"冰醋酸忍者",correct:false}],failReason:"冰醋酸是醋酸的特性！小蘇打加熱分解產生CO₂。",studyNote:"碳酸氫鈉（NaHCO₃）俗稱小蘇打，受熱分解：2NaHCO₃ → Na₂CO₃ + H₂O + CO₂↑"}
];

var FRUITS=[
  {type:"acid",label:"酸性果實",emoji:"🍎",color:"#e74c3c",bg:"#fadbd8"},
  {type:"base",label:"鹼性果實",emoji:"🫐",color:"#2980b9",bg:"#d6eaf8"},
  {type:"neutral",label:"中性果實",emoji:"🥚",color:"#7f8c8d",bg:"#eaeded"}
];

/* ══════════════════════════════════════════
   遊戲狀態
══════════════════════════════════════════ */
var BASE=100,TIME_BONUS=50,PENALTY=20,MAX_SCORE=SUBSTANCES.length*(BASE+TIME_BONUS)+700;
var queue,current,phase,totalScore,spiritMistakes,spiritStart,captured,spiritScores,timerInterval,elapsed,currentActions;
var bossQIdx=0,bossCorrect=0,bossShuffledQ=[];

/* ══════════════════════════════════════════
   工具函式
══════════════════════════════════════════ */
function $(id){return document.getElementById(id);}
function showScreen(id){['screen-title','screen-game','screen-boss','screen-complete'].forEach(function(s){$(s).classList.add('hidden');});$(id).classList.remove('hidden');}
function getRank(s){
  if(s>=1400)return{label:"電解質究極大師 S+",color:"#d4ac0d",emoji:"👑"};
  if(s>=1100)return{label:"電解質大師 S",color:"#d4ac0d",emoji:"👑"};
  if(s>=900)return{label:"化學達人 A",color:"#8e44ad",emoji:"🏆"};
  if(s>=700)return{label:"精靈訓練師 B",color:"#2980b9",emoji:"🥇"};
  return{label:"見習收服師 C",color:"#27ae60",emoji:"🥈"};
}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function startTimer(){clearInterval(timerInterval);elapsed=0;spiritStart=Date.now();timerInterval=setInterval(function(){elapsed=Math.floor((Date.now()-spiritStart)/1000);$('timer-display').textContent=elapsed;},300);}
function stopTimer(){clearInterval(timerInterval);}
function makeAvatarEl(svg,w,h,radius,bg){var d=document.createElement('div');d.style.cssText='width:'+w+'px;height:'+h+'px;border-radius:'+radius+'px;overflow:hidden;background:'+(bg||'transparent')+';flex-shrink:0;';d.innerHTML=svg;return d;}
function updateHdr(){$('captured-count').textContent=captured.length;$('score-display').textContent=totalScore;var segs=$('progress-strip').querySelectorAll('.pstrip-seg');for(var i=0;i<segs.length;i++)segs[i].className='pstrip-seg'+(i<captured.length?' done':'');}
function buildStrip(){var s=$('progress-strip');s.innerHTML='';for(var i=0;i<SUBSTANCES.length;i++){var d=document.createElement('div');d.className='pstrip-seg';s.appendChild(d);}}
function calcScore(m,s){return Math.max(0,BASE+Math.max(0,TIME_BONUS-Math.floor(s/5)*5)-m*PENALTY);}

/* ══════════════════════════════════════════
   基礎關卡
══════════════════════════════════════════ */
function startGame(){
  queue=shuffle(SUBSTANCES);current=queue.shift();
  phase=1;totalScore=0;spiritMistakes=0;captured=[];spiritScores=[];
  buildStrip();showScreen('screen-game');renderPhase1();startTimer();
}

function renderPhase1(){
  var c=current,card=$('spirit-card');
  card.style.background=c.bgColor;card.innerHTML='';
  var hdr=document.createElement('div');hdr.className='sp-header';
  var wrap=document.createElement('div');wrap.className='sp-avatar-wrap';
  var av=document.createElement('div');av.className='sp-avatar';av.innerHTML=SHADOW_SVG;
  wrap.appendChild(av);wrap.appendChild(makeLitmusHint(c.type));hdr.appendChild(wrap);
  var info=document.createElement('div');
  info.innerHTML='<div class="sp-phase">第 1 階段</div><div class="sp-title" style="color:'+c.color+'">黑影精靈出現了！</div><div class="sp-hint">觀察試紙變化，選擇正確的果實安撫牠！</div>';
  hdr.appendChild(info);card.appendChild(hdr);
  var mb=document.createElement('div');mb.id='mistake-bar';mb.className='mistake-bar';mb.style.display='none';card.appendChild(mb);
  var fb=document.createElement('div');fb.id='feedback-box';card.appendChild(fb);
  var area=$('choices-area');area.innerHTML='';
  var grid=document.createElement('div');grid.className='fruit-grid';
  FRUITS.forEach(function(f){
    var btn=document.createElement('button');btn.className='fruit-btn';
    btn.style.borderColor=f.color;btn.style.background=f.bg;
    btn.innerHTML='<div class="fruit-emoji">'+f.emoji+'</div><div class="fruit-label" style="color:'+f.color+'">'+f.label+'</div>';
    btn.addEventListener('click',function(){pickFruit(f.type);});grid.appendChild(btn);
  });
  area.appendChild(grid);updateHdr();
}

function renderPhase2(){
  var c=current,card=$('spirit-card');
  card.style.background=c.bgColor;card.innerHTML='';
  var hdr=document.createElement('div');hdr.className='sp-header';
  var wrap=document.createElement('div');wrap.className='sp-avatar-wrap';
  var av=document.createElement('div');av.className='sp-avatar';av.innerHTML=SPRITES[c.id];
  wrap.appendChild(av);hdr.appendChild(wrap);
  var info=document.createElement('div');
  info.innerHTML='<div class="sp-phase">第 2 階段</div><div class="sp-title" style="color:'+c.color+'">'+c.title+'顯露真身！</div><div class="sp-hint">'+c.name+'（'+c.formula+'）— 選出正確的收服動作！</div>';
  hdr.appendChild(info);card.appendChild(hdr);
  var mb=document.createElement('div');mb.id='mistake-bar';mb.className='mistake-bar';mb.style.display='none';card.appendChild(mb);
  var fb=document.createElement('div');fb.id='feedback-box';card.appendChild(fb);
  currentActions=shuffle(c.actions);
  var area=$('choices-area');area.innerHTML='';
  var grid=document.createElement('div');grid.className='action-grid';
  currentActions.forEach(function(a,i){
    var btn=document.createElement('button');btn.className='action-btn';
    btn.style.borderColor=c.color;btn.style.color=c.color;btn.textContent=a.text;
    btn.addEventListener('click',function(){pickAction(i);});grid.appendChild(btn);
  });
  area.appendChild(grid);updateMistakeBar();
}

function updateMistakeBar(){var mb=$('mistake-bar');if(!mb)return;if(spiritMistakes>0){mb.textContent='已答錯 '+spiritMistakes+' 次，扣 '+(spiritMistakes*PENALTY)+' 分';mb.style.display='block';}else mb.style.display='none';}
function setFeedback(t,msg){var fb=$('feedback-box');if(!fb)return;fb.innerHTML='<div class="fb '+t+'">'+(t==='success'?'✅ ':'❌ ')+msg+'</div>';}

function pickFruit(type){
  if(type===current.correctFruit){setFeedback('success','正確！'+current.phase1Hint);phase=2;setTimeout(function(){renderPhase2();},500);}
  else{spiritMistakes++;updateMistakeBar();setFeedback('fail','選錯了！再仔細看試紙的變化！');}
}

function pickAction(idx){
  var a=currentActions[idx];
  if(a.correct){
    stopTimer();var secs=elapsed;var sc=calcScore(spiritMistakes,secs);
    totalScore+=sc;
    spiritScores.push({id:current.id,name:current.name,title:current.title,score:sc,mistakes:spiritMistakes,time:secs,color:current.color,bgColor:current.bgColor});
    captured.push(current);updateHdr();showCapturedCard(sc,secs);
  } else {spiritMistakes++;updateMistakeBar();setFeedback('fail','❌ '+current.failReason);}
}

function showCapturedCard(sc,secs){
  var c=current,ptsColor=sc>=BASE?'#27ae60':sc>=60?'#e67e22':'#e74c3c';
  var card=$('spirit-card');card.style.background=c.bgColor;card.innerHTML='';
  var inner=document.createElement('div');inner.className='captured-inner';
  var av=document.createElement('div');av.className='cap-avatar';av.style.background=c.bgColor;av.innerHTML=SPRITES[c.id];
  inner.appendChild(av);
  inner.innerHTML+='<div class="cap-title-lbl" style="color:'+c.color+'">'+c.title+'</div>'
    +'<div class="cap-name" style="color:'+c.color+'">'+c.name+'</div>'
    +'<div class="cap-formula">'+c.formula+'</div>'
    +'<div class="cap-score-row"><span>⏱ '+secs+' 秒</span><span>❌ 錯 '+spiritMistakes+' 次</span><span style="font-weight:800;color:'+ptsColor+'">+'+sc+' 分</span></div>'
    +'<div class="cap-note"><b>📚 習作重點：</b>'+c.studyNote+'</div>';
  var btn=document.createElement('button');
  btn.className='btn-next-spirit';btn.style.background=c.color;btn.style.display='block';btn.style.margin='14px auto 0';
  var isLast=(queue.length===0);
  btn.textContent=isLast?'⚔️ 挑戰魔王關卡！':'前往下一隻精靈 →';
  btn.addEventListener('click',function(){nextSpirit();});
  inner.appendChild(btn);card.appendChild(inner);
  $('choices-area').innerHTML='';
}

function nextSpirit(){
  if(queue.length===0){startBossStage();return;}
  current=queue.shift();phase=1;spiritMistakes=0;renderPhase1();startTimer();
}

/* ══════════════════════════════════════════
   魔王關卡
══════════════════════════════════════════ */
function startBossStage(){
  bossQIdx=0;bossCorrect=0;
  bossShuffledQ=BOSS_QUESTIONS.slice(); // 保持順序，依習作題號
  showScreen('screen-boss');
  $('boss-avatar-el').innerHTML=BOSS_SVG;
  renderBossProgress();
  updateBossHP(7);
  renderBossQuestion();
}

function renderBossProgress(){
  var wrap=$('boss-progress');wrap.innerHTML='';
  for(var i=0;i<7;i++){
    var d=document.createElement('div');
    d.className='boss-dot'+(i<bossCorrect?' done':i===bossQIdx?' current':'');
    d.textContent=i<bossCorrect?'✓':(i+1);
    wrap.appendChild(d);
  }
}

function updateBossHP(remaining){
  var pct=Math.round(remaining/7*100);
  $('boss-hp-fill').style.width=pct+'%';
  $('boss-hp-text').textContent=remaining+' / 7';
  // 血條顏色隨HP變化
  var fill=$('boss-hp-fill');
  if(remaining<=2) fill.style.background='linear-gradient(90deg,#e74c3c,#ff6b6b)';
  else if(remaining<=4) fill.style.background='linear-gradient(90deg,#e67e22,#f39c12)';
  else fill.style.background='linear-gradient(90deg,#7b2ff7,#c850c0,#ff6b6b)';
}

function renderBossQuestion(){
  var area=$('boss-q-area');area.innerHTML='';
  if(bossQIdx>=7){showBossVictory();return;}
  var q=bossShuffledQ[bossQIdx];
  var card=document.createElement('div');card.className='boss-q-card';
  card.innerHTML='<div class="boss-q-num">⚡ '+q.num+'</div><div class="boss-q-text">'+q.text+'</div>';
  var opts=document.createElement('div');opts.className='boss-opts';
  q.opts.forEach(function(o,i){
    var btn=document.createElement('button');btn.className='boss-opt';btn.textContent=o;
    btn.addEventListener('click',function(){bossPickAnswer(i,btn,opts,q);});
    opts.appendChild(btn);
  });
  card.appendChild(opts);
  var fb=document.createElement('div');fb.id='boss-fb';card.appendChild(fb);
  area.appendChild(card);
}

function bossPickAnswer(idx,btn,optsEl,q){
  // 禁止重複點擊
  var btns=optsEl.querySelectorAll('.boss-opt');
  btns.forEach(function(b){b.style.pointerEvents='none';});

  var fb=$('boss-fb');
  if(idx===q.ans){
    btn.classList.add('correct');
    bossCorrect++;
    updateBossHP(7-bossCorrect);
    renderBossProgress();
    fb.className='boss-fb success';
    fb.textContent='✅ 正確！'+q.note;
    // 魔王受傷動畫
    var av=$('boss-avatar-el');av.classList.add('shake');
    setTimeout(function(){av.classList.remove('shake');},500);
    bossQIdx++;
    setTimeout(function(){renderBossQuestion();},1800);
  } else {
    btn.classList.add('wrong');
    fb.className='boss-fb counterattack';
    fb.textContent='⚡ 魔王反擊！錯了，再想想看……（正確觀念：'+q.note+'）';
    // 解鎖重試
    setTimeout(function(){
      btns.forEach(function(b){
        if(!b.classList.contains('wrong')) b.style.pointerEvents='auto';
      });
    },1200);
  }
}

function showBossVictory(){
  totalScore+=700;
  var area=$('boss-q-area');area.innerHTML='';
  var v=document.createElement('div');v.className='boss-victory';
  var godAv=document.createElement('div');godAv.className='boss-god-avatar';godAv.innerHTML=GOD_SVG;
  v.appendChild(godAv);
  v.innerHTML+='<div class="boss-victory-title">⚡ 究極神獸收服成功！</div>'
    +'<div class="boss-victory-sub">恭喜通過習作大考驗！<br>你已成為真正的電解質究極大師！</div>'
    +'<div class="boss-score-row"><span>🏆 魔王獎勵：+700 分</span><span>總分：'+totalScore+' 分</span></div>'
    +'<div class="boss-victory-note"><b>🎓 電解質知識總結：</b><br>'
    +'酸性物質能使藍色石蕊試紙變紅、解離出H⁺；鹼性物質使紅色石蕊試紙變藍。<br>'
    +'濃硫酸具脫水性；NaOH會潮解；CaO加水放熱；NH₃比空氣輕。<br>'
    +'碳酸氫鈉（小蘇打）遇酸產CO₂，是鑑別的好方法！</div>';
  var btn=document.createElement('button');
  btn.style.cssText='background:linear-gradient(90deg,#7b2ff7,#f1c40f);border:none;border-radius:24px;padding:12px 36px;font-size:16px;font-weight:800;color:#fff;display:block;margin:0 auto;';
  btn.textContent='查看最終成績 🏆';
  btn.addEventListener('click',showComplete);
  v.appendChild(btn);
  area.appendChild(v);
  // 更新血條清空
  updateBossHP(0);
  $('boss-hp-fill').style.width='0%';
}

/* ══════════════════════════════════════════
   結算
══════════════════════════════════════════ */
function showComplete(){
  showScreen('screen-complete');
  var rank=getRank(totalScore),pct=Math.round(totalScore/MAX_SCORE*100);
  $('comp-icon').textContent=rank.emoji;
  $('comp-score').innerHTML='<span style="color:'+rank.color+'">'+totalScore+'</span> <span style="font-size:16px;color:#888;font-weight:400;">/ '+MAX_SCORE+' 分</span>';
  $('rank-badge').textContent=rank.label;$('rank-badge').style.background=rank.color;
  $('comp-pct').textContent='得分率 '+pct+'%';
  setTimeout(function(){$('score-bar-fill').style.width=pct+'%';},100);
  var bl=$('breakdown-list');bl.innerHTML='';
  spiritScores.forEach(function(s){
    var pc=s.score>=BASE?'#27ae60':s.score>=60?'#e67e22':'#e74c3c';
    var row=document.createElement('div');row.className='breakdown-row';
    row.appendChild(makeAvatarEl(SPRITES[s.id],36,36,8,s.bgColor));
    var nm=document.createElement('span');nm.className='bdr-name';nm.textContent=s.name;
    var ms=document.createElement('span');ms.className='bdr-mistakes';ms.textContent='錯'+s.mistakes+'次';
    var ts=document.createElement('span');ts.className='bdr-time';ts.textContent=s.time+'秒';
    var ps=document.createElement('span');ps.className='bdr-pts';ps.style.color=pc;ps.textContent=s.score+'分';
    row.appendChild(nm);row.appendChild(ms);row.appendChild(ts);row.appendChild(ps);bl.appendChild(row);
  });
  // 魔王分數列
  var brow=document.createElement('div');brow.className='breakdown-row';
  brow.style.background='linear-gradient(90deg,rgba(123,47,247,0.1),rgba(200,80,192,0.1))';
  brow.style.border='1px solid rgba(123,47,247,0.3)';
  var bIcon=makeAvatarEl(BOSS_SVG,36,36,8,'#1a0a2e');
  brow.appendChild(bIcon);
  var bnm=document.createElement('span');bnm.className='bdr-name';bnm.textContent='魔王關卡';
  var bms=document.createElement('span');bms.className='bdr-mistakes';bms.style.color='#8e44ad';bms.textContent='7題全破';
  var bts=document.createElement('span');bts.className='bdr-time';bts.textContent='—';
  var bps=document.createElement('span');bps.className='bdr-pts';bps.style.color='#d4ac0d';bps.textContent='700分';
  brow.appendChild(bnm);brow.appendChild(bms);brow.appendChild(bts);brow.appendChild(bps);
  bl.appendChild(brow);

  var dg=$('dex-grid');dg.innerHTML='';
  captured.forEach(function(s){
    var d=document.createElement('div');d.className='dex-card';d.style.background=s.bgColor;
    d.appendChild(makeAvatarEl(SPRITES[s.id],52,52,10,s.bgColor));
    var tt=document.createElement('div');tt.className='dex-title-lbl';tt.style.color=s.color;tt.textContent=s.title;
    var nm=document.createElement('div');nm.className='dex-name';nm.style.color=s.color;nm.textContent=s.name;
    d.appendChild(tt);d.appendChild(nm);dg.appendChild(d);
  });
  // 究極神獸卡片
  var gc=document.createElement('div');gc.className='dex-card';
  gc.style.cssText='background:linear-gradient(135deg,#1a0a00,#2d1a00);border:2px solid #d4ac0d;border-radius:14px;padding:10px 6px;text-align:center;';
  gc.appendChild(makeAvatarEl(GOD_SVG,52,52,10,'transparent'));
  var gt=document.createElement('div');gt.className='dex-title-lbl';gt.style.color='#f1c40f';gt.textContent='究極神獸';
  var gn=document.createElement('div');gn.className='dex-name';gn.style.color='#ffd700';gn.textContent='電解質神';
  gc.appendChild(gt);gc.appendChild(gn);dg.appendChild(gc);
}

document.getElementById('btn-start').addEventListener('click',startGame);
document.getElementById('btn-restart').addEventListener('click',function(){showScreen('screen-title');});
</script>
</body>
</html>
