<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>反應速率偵探社</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050708;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:20px;font-family:"Segoe UI","Microsoft JhengHei",sans-serif}
#root{width:100%;max-width:600px}
button:focus{outline:2px solid #c8a84a;outline-offset:2px}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {createElement:h,useState,useEffect} = React;

const SUSPECTS=[
  {id:"A",emoji:"🧪",name:"本質改變先生",desc:"反應物活性決定基本速率"},
  {id:"B",emoji:"💧",name:"濃度女士",    desc:"改變單位體積的粒子數量"},
  {id:"C",emoji:"✂️",name:"表面積博士",  desc:"增加反應物的接觸面積"},
  {id:"D",emoji:"🔥",name:"溫度將軍",    desc:"控制粒子運動速度與能量"},
  {id:"E",emoji:"⚡",name:"催化劑幽靈",  desc:"降低活化能但不被消耗"},
];

const CASES=[
  {id:1,title:"冒泡的試管",location:"化學實驗室",urgency:"★★☆",
   desc:"小明將鹽酸滴在大理岩碎片上，觀察到少量氣泡。但隔壁桌的小華做同樣實驗時，氣泡速率卻快了三倍！兩人使用同樣品牌的鹽酸、同樣溫度、同樣大理岩碎片數量——但小華的鹽酸標籤寫著「3M」，小明的則是「1M」。",
   clue:"數字M代表什麼？兩人操作最大的差異在哪？",
   ans:"B",
   analysis:"小華使用3M鹽酸，濃度是小明的三倍！濃度越高，單位體積內的粒子數越多，碰撞機會越大，反應速率越快。濃度女士就是本案真兇！",
   keywords:["濃度","粒子數","碰撞機會"]},
  {id:2,title:"神奇的白色粉末",location:"研究室",urgency:"★★★",
   desc:"實驗室的雙氧水向來分解緩慢。今日早晨，助理阿志倒入雙氧水後短暫離開，回來時發現燒杯猛烈冒泡！監視器顯示有人放了一小匙黑色粉末。化驗後發現是二氧化錳（MnO₂）——反應前後，這匙粉末的質量幾乎沒有變化。",
   clue:"這個黑色粉末加速了反應，但本身幾乎沒被消耗——它是什麼角色？",
   ans:"E",
   analysis:"二氧化錳是雙氧水分解的催化劑！它能加快反應速率，但不改變生成物的量，且反應前後幾乎不被消耗。這正是催化劑幽靈的特徵！",
   keywords:["催化劑","活化能","不被消耗"]},
  {id:3,title:"烤肉現場",location:"戶外烤肉場",urgency:"★☆☆",
   desc:"烤肉派對上，阿國烤大塊牛肉，小蓉烤骰子牛（切成小塊）。兩人使用同樣的木炭、同樣火力、同樣重量的牛肉。20分鐘後，小蓉的牛肉早已全熟，阿國的大塊牛肉卻還是半生熟！",
   clue:"兩人唯一的差異是肉塊的大小——這改變了什麼物理性質？",
   ans:"C",
   analysis:"骰子牛切成小塊，總表面積遠大於大塊牛肉！表面積越大，與熱源接觸的面積越多，熱能傳遞越快，烹飪速率越快。表面積博士就是本案真兇！",
   keywords:["表面積","接觸面積","熱能傳遞"]},
  {id:4,title:"冰箱謀殺案",location:"便利商店後廚",urgency:"★★★",
   desc:"室溫架上的便當在8小時後就腐壞了，但放在冷藏櫃（4°C）的同款便當保存了三天都還新鮮。冷藏機器運作正常。為什麼同樣的便當，在不同環境下腐壞速率差這麼多？",
   clue:"腐壞是細菌的化學反應。室溫約25°C，冷藏4°C——溫差這麼大，對反應有何影響？",
   ans:"D",
   analysis:"溫度越高，粒子的運動速度越快，碰撞頻率越高，腐壞反應速率越快！冷藏就是透過降低溫度，讓腐敗反應大幅變慢。溫度將軍控制了一切！",
   keywords:["溫度","碰撞頻率","運動速度"]},
  {id:5,title:"黃金與鐵的命運",location:"古文物研究室",urgency:"★★☆",
   desc:"古墓中挖出一把鐵劍和一只金戒指。鐵劍已嚴重鏽蝕，表面滿是氧化鐵；金戒指卻依然閃閃發光，幾乎看不出氧化痕跡。兩件文物都暴露在同樣的地下環境中（相同濕度、溫度、時間）。",
   clue:"鐵和金都接觸了相同的氧氣，但氧化速率差異極大——這跟物質本身有關嗎？",
   ans:"A",
   analysis:"鐵的化學活性遠大於金！相同條件下，鐵對氧氣的反應活性高，氧化速率快；金的活性極低，幾乎不與氧反應。反應物本身的性質（本質）決定了基本速率！",
   keywords:["反應物本質","化學活性","氧化速率"]},
  {id:6,title:"神秘的試管爆炸事件",location:"高中化學實驗課",urgency:"★★★",
   desc:"老師準備兩組鋅與鹽酸反應的實驗。A組用鋅片，B組用鋅粉（研磨成細粉）。A組反應平穩，B組卻在加入鹽酸後劇烈冒泡，甚至有液體濺出！兩組鋅質量相同、鹽酸濃度相同、溫度相同——唯一不同的是鋅的形態。",
   clue:"鋅片和鋅粉，化學成分完全一樣，但形態不同——這改變了什麼？",
   ans:"C",
   analysis:"鋅粉研磨成細粉後，總表面積遠大於鋅片！相同質量的鋅，顆粒越小，與鹽酸接觸的面積越大，碰撞機會越多，反應越劇烈。這也是工廠嚴禁金屬粉塵的原因！",
   keywords:["表面積","顆粒大小","碰撞機會"]},
];

function highlight(text, keywords) {
  const parts = [];
  let rem = text;
  keywords.forEach(kw => {
    const idx = rem.indexOf(kw);
    if (idx !== -1) {
      if (idx > 0) parts.push({t: rem.slice(0, idx), gold: false});
      parts.push({t: kw, gold: true});
      rem = rem.slice(idx + kw.length);
    }
  });
  parts.push({t: rem, gold: false});
  return parts;
}

// ── TitleScreen ───────────────────────────────────────────────────────────
function TitleScreen({onStart}) {
  return h("div",{style:{textAlign:"center",padding:"20px 0"}},
    h("div",{style:{fontSize:13,letterSpacing:4,color:"#b59a5a",marginBottom:8,fontWeight:600}},"— 特別調查局 —"),
    h("div",{style:{fontSize:52,marginBottom:4}},"🔍"),
    h("h1",{style:{fontSize:28,fontWeight:900,color:"#f0d080",marginBottom:6,letterSpacing:2}},"反應速率偵探社"),
    h("p",{style:{color:"#a89060",fontSize:14,marginBottom:24}},"找出讓反應異常加速的真兇！"),
    h("div",{style:{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap",marginBottom:24}},
      ...SUSPECTS.map(s=>h("div",{key:s.id,style:{background:"#1a1f2e",border:"1px solid #3a3020",borderRadius:12,padding:"10px 12px",minWidth:88,textAlign:"center"}},
        h("div",{style:{fontSize:26}},s.emoji),
        h("div",{style:{color:"#c8a84a",fontSize:11,fontWeight:700,marginTop:4}},"嫌疑人 "+s.id),
        h("div",{style:{color:"#7a6840",fontSize:11,marginTop:2}},s.name)
      ))
    ),
    h("div",{style:{background:"#1a1f2e",border:"1px solid #3a3020",borderRadius:14,padding:16,maxWidth:360,margin:"0 auto 24px",textAlign:"left"}},
      h("p",{style:{color:"#c8a84a",fontWeight:700,fontSize:13,marginBottom:8}},"📋 偵查說明"),
      ...[["🗂 案件數","共 6 件神秘案件"],["🏆 滿分","60 分（每案 10 分）"],["🎯 任務","從 5 位嫌疑人中找出真兇"]].map(([k,v])=>
        h("div",{key:k,style:{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #2a2520"}},
          h("span",{style:{color:"#7a6840",fontSize:13}},k),
          h("span",{style:{color:"#c8c0a8",fontSize:13}},v)
        )
      )
    ),
    h("button",{onClick:onStart,style:{background:"linear-gradient(135deg,#c8a84a,#8a6820)",color:"#0a0c14",border:"none",borderRadius:14,padding:"14px 40px",fontSize:18,fontWeight:900,cursor:"pointer",letterSpacing:2,fontFamily:"inherit"}},
      "開始偵查"
    )
  );
}

// ── SuspectCard ───────────────────────────────────────────────────────────
function SuspectCard({s, selected, confirmed, isAns, isPick, onClick}) {
  let bg="#12151e", border="2px solid #2a2520";
  if (confirmed) {
    if (isAns) { bg="#0a2010"; border="2px solid #10b981"; }
    else if (isPick && !isAns) { bg="#200a0a"; border="2px solid #ef4444"; }
  } else if (selected) {
    bg="#1e2a1a"; border="2px solid #c8a84a";
  }
  return h("button",{onClick,style:{background:bg,border,borderRadius:12,padding:"12px 10px",cursor:confirmed?"default":"pointer",textAlign:"left",width:"100%",fontFamily:"inherit",boxShadow:selected&&!confirmed?"0 0 12px #c8a84a44":"none",transition:"all 0.2s"}},
    h("div",{style:{fontSize:24,marginBottom:4}},s.emoji),
    h("div",{style:{color:"#c8a84a",fontSize:11,fontWeight:700}},"嫌疑人 "+s.id),
    h("div",{style:{color:"#f0e8c8",fontSize:12,fontWeight:600}},s.name),
    h("div",{style:{color:"#7a6840",fontSize:11,marginTop:3}},s.desc),
    confirmed&&isAns&&h("div",{style:{background:"#10b981",color:"#fff",borderRadius:6,padding:"1px 6px",fontSize:11,fontWeight:700,display:"inline-block",marginTop:4}},"真兇 ✓"),
    confirmed&&isPick&&!isAns&&h("div",{style:{background:"#ef4444",color:"#fff",borderRadius:6,padding:"1px 6px",fontSize:11,fontWeight:700,display:"inline-block",marginTop:4}},"誤判")
  );
}

// ── CaseScreen ────────────────────────────────────────────────────────────
function CaseScreen({caseData, caseIdx, score, onNext}) {
  const [selected, setSelected] = useState(null);
  const [confirmed, setConfirmed] = useState(false);
  const [showNote, setShowNote] = useState(false);
  const isCorrect = confirmed && selected === caseData.ans;
  const correctS = SUSPECTS.find(s=>s.id===caseData.ans);
  const selectedS = SUSPECTS.find(s=>s.id===selected);
  const urgColor = caseData.urgency.startsWith("★★★")?"#ef4444":caseData.urgency.startsWith("★★")?"#f59e0b":"#10b981";

  const confirm = () => {
    setConfirmed(true);
    setTimeout(()=>setShowNote(true), 600);
  };

  const grid2 = SUSPECTS.slice(0,4);
  const last = SUSPECTS[4];

  return h("div",null,
    // progress
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
      h("div",{style:{display:"flex",gap:6}},
        ...CASES.map((_,i)=>h("div",{key:i,style:{width:26,height:26,borderRadius:13,
          background:i<caseIdx?"#c8a84a":i===caseIdx?"#f0d080":"#1a1f2e",
          border:`2px solid ${i<=caseIdx?"#c8a84a":"#2a2520"}`,
          display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:11,fontWeight:700,color:i<=caseIdx?"#0a0c14":"#3a3020"}},
          i<caseIdx?"✓":i+1
        ))
      ),
      h("div",{style:{background:"#1a1f2e",border:"1px solid #3a3020",borderRadius:20,padding:"4px 14px",color:"#c8a84a",fontWeight:700,fontSize:14}},
        "得分 "+score
      )
    ),
    // case file
    h("div",{style:{background:"#12151e",border:"2px solid #3a3020",borderRadius:16,padding:18,marginBottom:14,position:"relative"}},
      h("div",{style:{position:"absolute",top:12,right:12,background:"#0a0c14",border:"1px solid #3a3020",borderRadius:8,padding:"2px 10px",fontSize:11,color:"#7a6840"}},
        "案件 #"+String(caseData.id).padStart(2,"0")
      ),
      h("h2",{style:{color:"#f0d080",fontSize:19,fontWeight:800,marginBottom:10,paddingRight:60}},"📁 "+caseData.title),
      h("div",{style:{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}},
        h("span",{style:{background:"#1a1f2e",color:"#c8a84a",border:"1px solid #3a3020",borderRadius:20,padding:"2px 10px",fontSize:12}},"📍 "+caseData.location),
        h("span",{style:{background:"#1a1f2e",color:urgColor,border:"1px solid "+urgColor+"44",borderRadius:20,padding:"2px 10px",fontSize:12}},"緊急 "+caseData.urgency)
      ),
      h("p",{style:{color:"#c8c0a8",fontSize:14,lineHeight:1.7,marginBottom:12}},caseData.desc),
      h("div",{style:{background:"#1a1f2e",borderLeft:"3px solid #c8a84a",borderRadius:"0 8px 8px 0",padding:"10px 14px"}},
        h("span",{style:{color:"#c8a84a",fontWeight:700,fontSize:13}},"🔍 線索："),
        h("span",{style:{color:"#a89060",fontSize:13}},caseData.clue)
      )
    ),
    // suspects grid
    !confirmed&&h("div",null,
      h("p",{style:{color:"#7a6840",fontSize:13,marginBottom:10,textAlign:"center"}},"— 從五位嫌疑人中選出真兇 —"),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}},
        ...grid2.map(s=>h(SuspectCard,{key:s.id,s,selected:selected===s.id,confirmed,isAns:s.id===caseData.ans,isPick:s.id===selected,onClick:()=>setSelected(s.id)}))
      ),
      h("div",{style:{display:"flex",justifyContent:"center",marginBottom:14}},
        h("div",{style:{width:"calc(50% - 5px)"}},
          h(SuspectCard,{s:last,selected:selected===last.id,confirmed,isAns:last.id===caseData.ans,isPick:last.id===selected,onClick:()=>setSelected(last.id)})
        )
      ),
      selected&&h("div",{style:{textAlign:"center"}},
        h("p",{style:{color:"#c8a84a",fontSize:14,marginBottom:10}},"你懷疑 ",h("strong",null,selectedS?.name),"！確認逮捕？"),
        h("button",{onClick:confirm,style:{background:"linear-gradient(135deg,#c8a84a,#8a6820)",color:"#0a0c14",border:"none",borderRadius:12,padding:"11px 32px",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}},
          "🔒 確認逮捕"
        )
      )
    ),
    // result
    confirmed&&h("div",null,
      h("div",{style:{textAlign:"center",marginBottom:14}},
        isCorrect
          ? h("div",{style:{background:"#0a2010",border:"2px solid #10b981",borderRadius:14,padding:"14px 20px"}},
              h("div",{style:{fontSize:28,marginBottom:4}},"🎉"),
              h("div",{style:{color:"#10b981",fontSize:18,fontWeight:900}},"案件偵破！"),
              h("div",{style:{color:"#6ee7b7",fontSize:14,marginTop:4}},"+10 分｜逮捕成功 ✓")
            )
          : h("div",{style:{background:"#200a0a",border:"2px solid #ef4444",borderRadius:14,padding:"14px 20px"}},
              h("div",{style:{fontSize:28,marginBottom:4}},"❌"),
              h("div",{style:{color:"#ef4444",fontSize:18,fontWeight:900}},"線索不足，嫌疑人逃脫！"),
              h("div",{style:{color:"#fca5a5",fontSize:14,marginTop:4}},"真兇是："+correctS?.emoji+" "+correctS?.name)
            )
      ),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}},
        ...SUSPECTS.map(s=>h(SuspectCard,{key:s.id,s,selected:false,confirmed:true,isAns:s.id===caseData.ans,isPick:s.id===selected,onClick:()=>{}}))
      ),
      showNote&&h("div",{style:{background:"#12151e",border:"1px solid #3a3020",borderRadius:14,padding:16,marginBottom:14}},
        h("p",{style:{color:"#c8a84a",fontWeight:700,fontSize:14,marginBottom:8}},"📓 偵探筆記"),
        h("p",{style:{color:"#c8c0a8",fontSize:14,lineHeight:1.7}},
          ...highlight(caseData.analysis, caseData.keywords).map((part,i)=>
            part.gold
              ? h("span",{key:i,style:{color:"#f0d080",fontWeight:700}},part.t)
              : h("span",{key:i},part.t)
          )
        )
      ),
      h("button",{onClick:()=>onNext(selected,isCorrect),style:{background:"linear-gradient(135deg,#c8a84a,#8a6820)",color:"#0a0c14",border:"none",borderRadius:12,padding:"11px 28px",fontSize:15,fontWeight:700,cursor:"pointer",width:"100%",fontFamily:"inherit"}},
        caseIdx<CASES.length-1?"下一案 →":"查看結案報告 📋"
      )
    )
  );
}

// ── FinalScreen ───────────────────────────────────────────────────────────
function FinalScreen({results, onRestart}) {
  const score = results.filter(r=>r.correct).length*10;
  const stars = score===60?3:score>=40?2:1;
  const comment = score===60?"頂尖偵探！五大因素全部掌握，會考無懼！":score>=40?"資深偵探，再複習幾個因素就完美了！":"實習偵探，繼續加油，案件真相在課本裡等你！";
  const gc = score===60?"#f0d080":score>=40?"#c8a84a":"#7a6840";

  return h("div",{style:{textAlign:"center"}},
    h("div",{style:{fontSize:48,marginBottom:6}},"📋"),
    h("div",{style:{fontSize:12,letterSpacing:3,color:"#7a6840",marginBottom:4}},"— 特別調查局 —"),
    h("h2",{style:{color:"#f0d080",fontSize:22,fontWeight:900,marginBottom:4}},"結案報告書"),
    h("div",{style:{display:"flex",gap:4,justifyContent:"center",marginBottom:10}},
      ...[1,2,3].map(i=>h("span",{key:i,style:{fontSize:28,color:i<=stars?"#f0d080":"#2a2520"}},"★"))
    ),
    h("div",{style:{fontSize:56,fontWeight:900,color:gc,lineHeight:1,marginBottom:4}},score),
    h("div",{style:{color:"#7a6840",fontSize:14,marginBottom:8}},"/ 60 分"),
    h("p",{style:{color:"#c8c0a8",fontSize:14,marginBottom:20}},comment),
    h("div",{style:{background:"#12151e",border:"1px solid #3a3020",borderRadius:14,padding:16,maxWidth:480,margin:"0 auto 20px",textAlign:"left",overflowX:"auto"}},
      h("p",{style:{color:"#c8a84a",fontWeight:700,fontSize:13,marginBottom:10}},"案件紀錄"),
      h("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:12}},
        h("thead",null,
          h("tr",null,
            ...["案件","真兇","你的選擇","結果"].map(t=>h("th",{key:t,style:{color:"#7a6840",fontWeight:700,padding:"4px 8px 8px",borderBottom:"1px solid #2a2520",textAlign:"left",whiteSpace:"nowrap"}},t))
          )
        ),
        h("tbody",null,
          ...results.map((r,i)=>{
            const c=CASES[i];
            const ans=SUSPECTS.find(s=>s.id===c.ans);
            const pick=SUSPECTS.find(s=>s.id===r.pick);
            return h("tr",{key:i,style:{borderBottom:"1px solid #1a1520"}},
              h("td",{style:{color:"#c8c0a8",padding:"6px 8px",whiteSpace:"nowrap"}},c.title),
              h("td",{style:{color:"#f0d080",padding:"6px 8px",whiteSpace:"nowrap"}},ans?.emoji+" "+ans?.name),
              h("td",{style:{color:r.correct?"#6ee7b7":"#fca5a5",padding:"6px 8px",whiteSpace:"nowrap"}},pick?.emoji+" "+pick?.name),
              h("td",{style:{color:r.correct?"#10b981":"#ef4444",fontWeight:700,fontSize:16,padding:"6px 8px"}},r.correct?"✓":"✗")
            );
          })
        )
      )
    ),
    h("button",{onClick:onRestart,style:{background:"linear-gradient(135deg,#c8a84a,#8a6820)",color:"#0a0c14",border:"none",borderRadius:14,padding:"13px 36px",fontSize:16,fontWeight:900,cursor:"pointer",letterSpacing:1,fontFamily:"inherit"}},
      "🔄 重新偵查"
    )
  );
}

// ── App ───────────────────────────────────────────────────────────────────
function App() {
  const [screen,setScreen]=useState("title");
  const [caseIdx,setCaseIdx]=useState(0);
  const [score,setScore]=useState(0);
  const [results,setResults]=useState([]);

  const handleNext=(pick,correct)=>{
    const nr=[...results,{pick,correct}];
    setResults(nr);
    if(correct) setScore(s=>s+10);
    if(caseIdx+1<CASES.length){setCaseIdx(caseIdx+1);}
    else{setScreen("final");}
  };

  const restart=()=>{setScreen("title");setCaseIdx(0);setScore(0);setResults([]);};

  const wrap={minHeight:520,background:"#0a0c14",borderRadius:20,padding:"24px 20px",color:"#f0e8c8",maxWidth:600,margin:"0 auto"};

  if(screen==="title") return h("div",{style:wrap},h(TitleScreen,{onStart:()=>setScreen("case")}));
  if(screen==="final") return h("div",{style:wrap},h(FinalScreen,{results,onRestart:restart}));
  return h("div",{style:wrap},
    h(CaseScreen,{key:caseIdx,caseData:CASES[caseIdx],caseIdx,score,onNext:handleNext})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
</script>
</body>
</html>
